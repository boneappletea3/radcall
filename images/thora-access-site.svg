<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 520" font-family="'IBM Plex Sans', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c49464" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="650" height="520" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="325" y="34" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="700" letter-spacing="0.08em">THORACENTESIS — POSITIONING &amp; ACCESS</text>

  <!-- ═══ LEFT PANEL: Patient positioning ═══ -->
  <text x="175" y="64" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700">PATIENT POSITIONING</text>

  <!-- Bedside table -->
  <rect x="60" y="290" width="100" height="8" rx="3" fill="#64748b" opacity="0.5"/>
  <rect x="70" y="298" width="4" height="60" rx="2" fill="#64748b" opacity="0.4"/>
  <rect x="146" y="298" width="4" height="60" rx="2" fill="#64748b" opacity="0.4"/>
  <text x="110" y="375" text-anchor="middle" fill="#94a3b8" font-size="9">Table</text>

  <!-- Pillow on table -->
  <ellipse cx="110" cy="282" rx="35" ry="14" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.3"/>
  <text x="110" y="286" text-anchor="middle" fill="#c4b5fd" font-size="8">Pillow</text>

  <!-- Patient body - seated, leaning forward -->
  <!-- Torso (back facing us) -->
  <path d="M 160 160 Q 155 200 158 240 Q 160 270 165 290 Q 170 310 175 340 L 220 340 Q 225 310 228 290 Q 232 270 234 240 Q 236 200 232 160 Z" fill="url(#skin)" stroke="#d4a574" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Head (leaning forward) -->
  <ellipse cx="170" cy="145" rx="28" ry="30" fill="#d4a574" opacity="0.2" stroke="#d4a574" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Arms forward on table -->
  <path d="M 160 200 Q 140 240 120 270 Q 110 280 110 288" fill="none" stroke="#d4a574" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
  <path d="M 232 200 Q 215 240 180 270 Q 160 280 140 288" fill="none" stroke="#d4a574" stroke-width="8" stroke-linecap="round" opacity="0.2"/>

  <!-- Lean angle indicator -->
  <path d="M 240 160 L 240 300" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <path d="M 196 155 L 220 310" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- Angle arc -->
  <path d="M 240 220 Q 230 220 225 235" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
  <text x="248" y="230" fill="#bbf7d0" font-size="10" font-weight="600">15-20°</text>
  <text x="248" y="243" fill="#94a3b8" font-size="9">lean fwd</text>

  <!-- Spine line -->
  <path d="M 196 155 Q 195 200 196 250 Q 197 290 198 340" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="196" y="352" text-anchor="middle" fill="#94a3b8" font-size="8">Spine</text>

  <!-- Scapulae outlines -->
  <path d="M 168 180 Q 158 200 162 230 Q 168 240 178 235 Q 185 225 183 200 Q 180 185 168 180 Z" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M 224 180 Q 234 200 230 230 Q 224 240 214 235 Q 207 225 209 200 Q 212 185 224 180 Z" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="172" y="215" text-anchor="middle" fill="#fcd58e" font-size="8" opacity="0.7">Scap</text>
  <text x="220" y="215" text-anchor="middle" fill="#fcd58e" font-size="8" opacity="0.7">Scap</text>

  <!-- Access zone - highlighted area between scapulae and posterior axillary line -->
  <rect x="155" y="235" width="82" height="55" rx="10" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="196" y="268" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="700">ACCESS</text>
  <text x="196" y="280" text-anchor="middle" fill="#bbf7d0" font-size="9">ZONE</text>

  <!-- Positioning notes -->
  <rect x="20" y="390" width="310" height="115" rx="12" fill="#1e293b" opacity="0.6"/>
  <text x="175" y="412" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">Positioning</text>
  <circle cx="40" cy="430" r="4" fill="#22c55e" opacity="0.8"/>
  <text x="52" y="434" fill="#e5e7eb" font-size="10">Seated upright, leaning forward</text>
  <circle cx="40" cy="450" r="4" fill="#22c55e" opacity="0.8"/>
  <text x="52" y="454" fill="#e5e7eb" font-size="10">Arms resting on table with pillow</text>
  <circle cx="40" cy="470" r="4" fill="#38bdf8" opacity="0.8"/>
  <text x="52" y="474" fill="#94a3b8" font-size="10">Alt: lateral decubitus (affected side up)</text>
  <circle cx="40" cy="490" r="4" fill="#38bdf8" opacity="0.8"/>
  <text x="52" y="494" fill="#94a3b8" font-size="10">Alt: supine, HOB elevated 30-45°</text>

  <!-- ═══ RIGHT PANEL: Posterior anatomy cross-section ═══ -->
  <text x="490" y="64" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">INTERCOSTAL ACCESS</text>

  <!-- Rib cross-section view -->
  <rect x="360" y="85" width="260" height="320" rx="14" fill="#1e293b" opacity="0.4" stroke="#243041" stroke-width="1"/>

  <!-- Upper rib -->
  <ellipse cx="490" cy="130" rx="100" ry="18" fill="#e5e7eb" opacity="0.12" stroke="#e5e7eb" stroke-width="2" stroke-opacity="0.4"/>
  <text x="490" y="134" text-anchor="middle" fill="#e5e7eb" font-size="12" font-weight="700" opacity="0.7">UPPER RIB</text>

  <!-- Neurovascular bundle at inferior margin of upper rib -->
  <rect x="415" y="145" width="150" height="22" rx="6" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- VAN label -->
  <circle cx="440" cy="156" r="5" fill="#3b82f6" opacity="0.6"/>
  <text x="440" y="160" text-anchor="middle" fill="white" font-size="7" font-weight="800">V</text>
  <circle cx="465" cy="156" r="5" fill="#ef4444" opacity="0.7"/>
  <text x="465" y="160" text-anchor="middle" fill="white" font-size="7" font-weight="800">A</text>
  <circle cx="490" cy="156" r="5" fill="#f59e0b" opacity="0.6"/>
  <text x="490" y="160" text-anchor="middle" fill="white" font-size="7" font-weight="800">N</text>
  <text x="535" y="159" fill="#fecaca" font-size="9" font-weight="600">VAN bundle</text>

  <!-- DANGER arrow pointing to bundle -->
  <text x="380" y="158" fill="#ef4444" font-size="10" font-weight="800">AVOID</text>
  <line x1="405" y1="156" x2="413" y2="156" stroke="#ef4444" stroke-width="1.5"/>

  <!-- Intercostal space -->
  <rect x="390" y="172" width="200" height="80" rx="8" fill="#22c55e" opacity="0.06" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="490" y="195" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="600">INTERCOSTAL SPACE</text>

  <!-- Intercostal muscles layers -->
  <rect x="400" y="200" width="180" height="12" rx="3" fill="#94a3b8" opacity="0.1"/>
  <text x="490" y="210" text-anchor="middle" fill="#94a3b8" font-size="8">External intercostal m.</text>
  <rect x="400" y="216" width="180" height="12" rx="3" fill="#94a3b8" opacity="0.08"/>
  <text x="490" y="226" text-anchor="middle" fill="#94a3b8" font-size="8">Internal intercostal m.</text>

  <!-- Parietal pleura -->
  <path d="M 390 240 L 590 240" stroke="#a78bfa" stroke-width="2.5" opacity="0.6"/>
  <text x="595" y="244" fill="#c4b5fd" font-size="9">Pleura</text>

  <!-- Pleural fluid -->
  <rect x="390" y="243" width="200" height="50" rx="4" fill="#38bdf8" opacity="0.08"/>
  <text x="490" y="273" text-anchor="middle" fill="#38bdf8" font-size="11" opacity="0.5">PLEURAL FLUID</text>

  <!-- Lower rib -->
  <ellipse cx="490" cy="315" rx="100" ry="18" fill="#e5e7eb" opacity="0.12" stroke="#e5e7eb" stroke-width="2" stroke-opacity="0.4"/>
  <text x="490" y="319" text-anchor="middle" fill="#e5e7eb" font-size="12" font-weight="700" opacity="0.7">LOWER RIB</text>

  <!-- Needle — entering ABOVE the lower rib -->
  <line x1="430" y1="385" x2="460" y2="295" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round"/>
  <!-- Needle hub -->
  <rect x="422" y="383" width="18" height="14" rx="4" fill="#64748b" stroke="#94a3b8" stroke-width="1"/>

  <!-- Green checkmark at correct entry point (above lower rib) -->
  <circle cx="455" cy="298" r="10" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
  <text x="455" y="302" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="800">✓</text>

  <!-- Arrow showing "above the rib" -->
  <path d="M 520 330 Q 510 315 480 300" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="480,297 483,305 488,299" fill="#22c55e"/>
  <text x="525" y="328" fill="#bbf7d0" font-size="10" font-weight="600">Enter ABOVE</text>
  <text x="525" y="341" fill="#bbf7d0" font-size="10" font-weight="600">the lower rib</text>

  <!-- Red X at wrong entry point (below upper rib) -->
  <circle cx="455" cy="156" r="8" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
  <text x="455" y="160" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="800">✗</text>

  <!-- Diaphragm warning at bottom -->
  <rect x="370" y="360" width="240" height="35" rx="8" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="490" y="378" text-anchor="middle" fill="#fecaca" font-size="10" font-weight="600">Never below 8th ICS posteriorly</text>
  <text x="490" y="390" text-anchor="middle" fill="#94a3b8" font-size="9">Risk of liver (R) / spleen (L) injury</text>

  <!-- ═══ BOTTOM BAR: Key landmarks ═══ -->
  <rect x="360" y="420" width="260" height="85" rx="12" fill="#1e293b" opacity="0.6"/>
  <text x="490" y="442" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">Access Landmarks</text>
  <circle cx="380" cy="460" r="4" fill="#22c55e"/>
  <text x="392" y="464" fill="#e5e7eb" font-size="10">Posterior axillary → midscapular line</text>
  <circle cx="380" cy="480" r="4" fill="#22c55e"/>
  <text x="392" y="484" fill="#e5e7eb" font-size="10">1-2 ICS below fluid level on US</text>
  <circle cx="380" cy="500" r="4" fill="#f59e0b"/>
  <text x="392" y="504" fill="#fcd58e" font-size="10">Mark diaphragm apex at end-expiration</text>
</svg>