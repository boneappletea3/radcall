<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" font-family="'IBM Plex Sans', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <!-- Cortex fill: subtle blue-gray -->
    <radialGradient id="cortexFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0f2035" stop-opacity="0.8"/>
    </radialGradient>
  </defs>
  <rect width="700" height="460" fill="url(#bg)" rx="16"/>
  <text x="350" y="32" text-anchor="middle" fill="#38bdf8" font-size="15" font-weight="700" letter-spacing="0.06em">RENAL BIOPSY — CORTICAL TANGENTIAL APPROACH</text>

  <!-- ═══ LEFT PANEL: Kidney cross-section (coronal) ═══ -->
  <text x="192" y="57" text-anchor="middle" fill="#94a3b8" font-size="11">Coronal Section — Kidney (Posterior Approach)</text>

  <!-- Outer kidney / cortex — bean shape using a slightly flattened ellipse -->
  <ellipse cx="192" cy="248" rx="148" ry="178" fill="url(#cortexFill)" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.4"/>

  <!-- Cortex label line -->
  <line x1="332" y1="128" x2="302" y2="108" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="338" y="125" fill="#94a3b8" font-size="10">Cortex</text>
  <text x="338" y="137" fill="#86efac" font-size="9">(TARGET)</text>

  <!-- Medullary pyramids — 6 triangles arranged in a ring, bases outward, tips inward -->
  <!-- Upper-left pyramid -->
  <polygon points="100,148  152,192  100,235" fill="#0a1628" stroke="#334155" stroke-width="1.2" stroke-opacity="0.7"/>
  <!-- Upper-center pyramid -->
  <polygon points="155,92  198,160  240,92" fill="#0a1628" stroke="#334155" stroke-width="1.2" stroke-opacity="0.7"/>
  <!-- Upper-right pyramid -->
  <polygon points="248,148  282,192  248,235" fill="#0a1628" stroke="#334155" stroke-width="1.2" stroke-opacity="0.7"/>
  <!-- Lower-left pyramid -->
  <polygon points="100,260  152,305  100,348" fill="#0a1628" stroke="#334155" stroke-width="1.2" stroke-opacity="0.7"/>
  <!-- Lower-center pyramid -->
  <polygon points="155,405  198,335  240,405" fill="#0a1628" stroke="#334155" stroke-width="1.2" stroke-opacity="0.7"/>
  <!-- Lower-right pyramid -->
  <polygon points="248,260  282,305  248,348" fill="#0a1628" stroke="#334155" stroke-width="1.2" stroke-opacity="0.7"/>

  <!-- Medulla label -->
  <text x="192" y="258" text-anchor="middle" fill="#475569" font-size="10">Medulla</text>
  <text x="192" y="271" text-anchor="middle" fill="#475569" font-size="9">(pyramids)</text>

  <!-- Collecting system / renal pelvis — central oval -->
  <ellipse cx="192" cy="248" rx="44" ry="54" fill="#0d1117" stroke="#334155" stroke-width="1.5"/>
  <text x="192" y="244" text-anchor="middle" fill="#475569" font-size="9">Collecting</text>
  <text x="192" y="257" text-anchor="middle" fill="#475569" font-size="9">system</text>

  <!-- Hilum indent (medial / right side of kidney) -->
  <path d="M 335 228 Q 356 248 335 268" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-opacity="0.6"/>
  <text x="358" y="245" fill="#fca5a5" font-size="10" font-weight="700">Hilum</text>
  <text x="358" y="258" fill="#fca5a5" font-size="9">AVOID</text>

  <!-- ═══ CORRECT needle — tangential (GREEN) ═══ -->
  <!-- Enters from posterior-lateral (left side), runs parallel to capsule through outer cortex -->
  <line x1="20" y1="178" x2="100" y2="188" stroke="#22c55e" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
  <!-- Show the needle arc within the outer cortex (not entering deep) -->
  <path d="M 64 158 Q 90 125 136 108 Q 180 96 224 102" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-opacity="0.55" stroke-dasharray="7,4" stroke-linecap="round"/>
  <circle cx="18" cy="178" r="5" fill="#22c55e" opacity="0.6"/>
  <text x="14" y="168" fill="#86efac" font-size="10" font-weight="700">✓ CORRECT</text>
  <text x="14" y="198" fill="#86efac" font-size="9">Tangential</text>

  <!-- ═══ WRONG needle — aimed at medulla (RED) ═══ -->
  <line x1="20" y1="310" x2="172" y2="262" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" opacity="0.65" stroke-dasharray="8,4"/>
  <circle cx="18" cy="310" r="5" fill="#ef4444" opacity="0.5"/>
  <text x="18" y="300" fill="#fca5a5" font-size="9" font-weight="700">✕ WRONG</text>
  <text x="14" y="326" fill="#fca5a5" font-size="9">Aimed at medulla</text>

  <!-- Posterior label -->
  <text x="192" y="440" text-anchor="middle" fill="#334155" font-size="9">← POSTERIOR ACCESS · Lower pole preferred (avoid hilum and collecting system)</text>

  <!-- ═══ RIGHT PANEL ═══ -->

  <!-- Depth diagram -->
  <rect x="390" y="65" width="285" height="195" rx="14" fill="#1e293b" opacity="0.65" stroke="#243041" stroke-width="1.5"/>
  <text x="532" y="90" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="700">CORTICAL TANGENTIAL</text>
  <text x="532" y="106" text-anchor="middle" fill="#64748b" font-size="10">Needle runs parallel to outer capsule</text>

  <!-- Depth layers -->
  <rect x="406" y="118" width="254" height="20" rx="4" fill="#38bdf8" opacity="0.07" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="533" y="132" text-anchor="middle" fill="#7dd3fc" font-size="9">Renal Capsule</text>

  <rect x="406" y="142" width="254" height="38" rx="4" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.65"/>
  <text x="533" y="158" text-anchor="middle" fill="#86efac" font-size="10" font-weight="700">OUTER CORTEX — TARGET</text>
  <text x="533" y="173" text-anchor="middle" fill="#86efac" font-size="9">Glomeruli · Needle runs parallel here</text>

  <rect x="406" y="184" width="254" height="34" rx="4" fill="#ef4444" opacity="0.07" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
  <text x="533" y="198" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">MEDULLA — AVOID</text>
  <text x="533" y="212" text-anchor="middle" fill="#94a3b8" font-size="9">Vessels, pyramids, high AV fistula risk</text>

  <rect x="406" y="222" width="254" height="26" rx="4" fill="#ef4444" opacity="0.05" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="533" y="239" text-anchor="middle" fill="#94a3b8" font-size="9">Collecting system / Hilum — AVOID</text>

  <!-- Key rule box -->
  <rect x="390" y="276" width="285" height="118" rx="14" fill="#1e293b" opacity="0.65" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.55"/>
  <text x="532" y="299" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">TECHNIQUE RULE</text>
  <line x1="404" y1="307" x2="660" y2="307" stroke="#22c55e" stroke-width="1" stroke-opacity="0.25"/>
  <text x="404" y="324" fill="#94a3b8" font-size="10">Needle parallel to outer capsule</text>
  <text x="404" y="340" fill="#94a3b8" font-size="10">through outer 1/3 of cortex only</text>
  <text x="404" y="362" fill="#fca5a5" font-size="10" font-weight="700">NEVER aim at medulla or hilum</text>
  <text x="404" y="378" fill="#94a3b8" font-size="10">→ Risk: major artery injury, AV fistula</text>

  <!-- Adequacy / US tips -->
  <rect x="390" y="410" width="285" height="38" rx="10" fill="#1e293b" opacity="0.5" stroke="#243041" stroke-width="1"/>
  <text x="532" y="426" text-anchor="middle" fill="#94a3b8" font-size="10">US: cortex = hypoechoic · medulla = echogenic</text>
  <text x="532" y="441" text-anchor="middle" fill="#94a3b8" font-size="9">Banff adequacy: ≥10 glomeruli + ≥2 muscular arteries</text>
</svg>
