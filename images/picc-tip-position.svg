<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" font-family="'IBM Plex Sans', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="700" height="460" fill="url(#bg)" rx="16"/>
  <text x="350" y="32" text-anchor="middle" fill="#38bdf8" font-size="15" font-weight="700" letter-spacing="0.06em">PICC PLACEMENT — TIP POSITION &amp; CATHETER ROUTES</text>

  <!-- ═══ CENTRAL VASCULAR ANATOMY ═══ -->
  <text x="350" y="56" text-anchor="middle" fill="#94a3b8" font-size="11">Central Venous Anatomy (Anterior View)</text>

  <!-- SVC — main trunk, vertical -->
  <rect x="302" y="148" width="56" height="178" rx="10" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.6"/>
  <text x="330" y="245" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="700">SVC</text>

  <!-- RIGHT ATRIUM -->
  <ellipse cx="330" cy="348" rx="48" ry="36" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="330" y="353" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="600">RA</text>

  <!-- RIGHT VENTRICLE (lower, slightly offset) -->
  <ellipse cx="330" cy="410" rx="42" ry="28" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>
  <text x="330" y="414" text-anchor="middle" fill="#334155" font-size="10">RV</text>

  <!-- LEFT BRACHIOCEPHALIC VEIN (runs horizontally from left to join SVC) -->
  <path d="M 110 148 Q 180 140 302 148" fill="none" stroke="#38bdf8" stroke-width="10" stroke-opacity="0.3" stroke-linecap="round"/>
  <path d="M 110 148 Q 180 140 302 148" fill="none" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.55"/>
  <text x="185" y="132" text-anchor="middle" fill="#64748b" font-size="9">Left brachiocephalic v.</text>

  <!-- RIGHT BRACHIOCEPHALIC VEIN (shorter, slight angle right to SVC) -->
  <path d="M 480 148 Q 420 142 358 148" fill="none" stroke="#38bdf8" stroke-width="10" stroke-opacity="0.3" stroke-linecap="round"/>
  <path d="M 480 148 Q 420 142 358 148" fill="none" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.55"/>
  <text x="435" y="132" text-anchor="middle" fill="#64748b" font-size="9">Right brachiocephalic v.</text>

  <!-- ═══ ZONE BANDS on SVC ═══ -->

  <!-- Too HIGH zone (red) — upper SVC / brachiocephalic junction -->
  <rect x="296" y="148" width="68" height="30" rx="5" fill="#ef4444" opacity="0.18" stroke="#ef4444" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Acceptable zone (amber) — mid SVC -->
  <rect x="296" y="178" width="68" height="50" rx="0" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>

  <!-- TARGET zone (green) — lower SVC / cavoatrial junction -->
  <rect x="296" y="228" width="68" height="60" rx="0" fill="#22c55e" opacity="0.14" stroke="#22c55e" stroke-width="2" stroke-opacity="0.7"/>
  <text x="330" y="255" text-anchor="middle" fill="#86efac" font-size="8" font-weight="700">TARGET</text>

  <!-- Too LOW zone (red) — mid RA and below -->
  <rect x="282" y="368" width="96" height="30" rx="0" fill="#ef4444" opacity="0.14" stroke="#ef4444" stroke-width="1" stroke-opacity="0.5"/>

  <!-- ═══ RIGHT-SIDED PICC (solid line, from right) ═══ -->
  <path d="M 565 200 Q 540 185 480 148 Q 420 142 370 155 L 330 260" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <circle cx="330" cy="260" r="5" fill="#22c55e" opacity="0.9"/>
  <circle cx="567" cy="200" r="4" fill="#22c55e" opacity="0.5"/>
  <text x="570" y="192" fill="#86efac" font-size="9" font-weight="700">R. Basilic/</text>
  <text x="570" y="204" fill="#86efac" font-size="9" font-weight="700">Brachial v.</text>

  <!-- Right-sided tip label -->
  <line x1="336" y1="260" x2="390" y2="248" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="3,2"/>
  <text x="393" y="245" fill="#86efac" font-size="9" font-weight="600">R-sided tip</text>
  <text x="393" y="257" fill="#86efac" font-size="9">≈ carina level on CXR</text>

  <!-- ═══ LEFT-SIDED PICC (dashed line, from left) ═══ -->
  <path d="M 105 220 Q 110 185 110 148 Q 180 140 302 155 L 330 278" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" stroke-dasharray="9,4"/>
  <circle cx="330" cy="278" r="5" fill="#38bdf8" opacity="0.85"/>
  <circle cx="103" cy="220" r="4" fill="#38bdf8" opacity="0.5"/>
  <text x="52" y="214" fill="#7dd3fc" font-size="9" font-weight="700">L. Basilic/</text>
  <text x="52" y="226" fill="#7dd3fc" font-size="9" font-weight="700">Brachial v.</text>

  <!-- Left-sided tip label -->
  <line x1="324" y1="278" x2="270" y2="290" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="3,2"/>
  <text x="205" y="290" fill="#7dd3fc" font-size="9">L-sided: 1–2 cm deeper</text>

  <!-- ═══ Carina reference line ═══ -->
  <line x1="200" y1="195" x2="480" y2="195" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="8,5" stroke-opacity="0.55"/>
  <text x="490" y="199" fill="#fcd58e" font-size="9">≈ Carina</text>

  <!-- ═══ RIGHT PANEL: zone labels ═══ -->
  <rect x="570" y="140" width="116" height="260" rx="14" fill="#1e293b" opacity="0.6" stroke="#243041" stroke-width="1.5"/>
  <text x="628" y="162" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">TIP POSITION</text>

  <!-- Too high -->
  <rect x="582" y="172" width="92" height="30" rx="6" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1" stroke-opacity="0.5"/>
  <text x="628" y="184" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="700">TOO HIGH</text>
  <text x="628" y="196" text-anchor="middle" fill="#fca5a5" font-size="8">Thrombosis risk</text>

  <!-- Acceptable -->
  <rect x="582" y="207" width="92" height="30" rx="6" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
  <text x="628" y="219" text-anchor="middle" fill="#fcd58e" font-size="9" font-weight="600">ACCEPTABLE</text>
  <text x="628" y="231" text-anchor="middle" fill="#94a3b8" font-size="8">Mid SVC</text>

  <!-- Target -->
  <rect x="582" y="242" width="92" height="40" rx="6" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="628" y="256" text-anchor="middle" fill="#86efac" font-size="9" font-weight="700">✓ TARGET</text>
  <text x="628" y="269" text-anchor="middle" fill="#86efac" font-size="8">Lower SVC /</text>
  <text x="628" y="280" text-anchor="middle" fill="#86efac" font-size="8">Cavoatrial jxn</text>

  <!-- Too low -->
  <rect x="582" y="287" width="92" height="30" rx="6" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1" stroke-opacity="0.45"/>
  <text x="628" y="299" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="700">TOO LOW</text>
  <text x="628" y="311" text-anchor="middle" fill="#fca5a5" font-size="8">Arrhythmia risk</text>

  <!-- Connection lines from zone bands to legend -->
  <line x1="296" y1="163" x2="582" y2="187" stroke="#ef4444" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="3,3"/>
  <line x1="296" y1="222" x2="582" y2="222" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="3,3"/>
  <line x1="296" y1="258" x2="582" y2="262" stroke="#22c55e" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="3,3"/>
  <line x1="282" y1="383" x2="582" y2="302" stroke="#ef4444" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="3,3"/>

  <!-- ═══ BOTTOM RULE ═══ -->
  <rect x="30" y="420" width="530" height="28" rx="8" fill="#1e293b" opacity="0.5" stroke="#243041" stroke-width="1"/>
  <text x="295" y="432" text-anchor="middle" fill="#94a3b8" font-size="10">Right PICC: tip at carina level on CXR · Left PICC: 1–2 cm deeper (longer path through brachiocephalic)</text>
  <text x="295" y="444" text-anchor="middle" fill="#64748b" font-size="9">If arrhythmia during insertion: withdraw until resolved — tip in RV or RA</text>
</svg>
