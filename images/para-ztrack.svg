<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="'IBM Plex Sans', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="420" fill="url(#bg2)" rx="16"/>

  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="700" letter-spacing="0.08em">Z-TRACK TECHNIQUE</text>

  <!-- ═══ PANEL 1: During insertion ═══ -->
  <text x="150" y="62" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700">A. DURING INSERTION</text>

  <!-- Tissue layers - Panel 1 -->
  <!-- Skin -->
  <rect x="30" y="80" width="240" height="30" rx="4" fill="#d4a574" opacity="0.3" stroke="#d4a574" stroke-width="1" stroke-opacity="0.5"/>
  <text x="38" y="100" fill="#e8b88a" font-size="10" font-weight="600">SKIN</text>

  <!-- Subcutaneous -->
  <rect x="30" y="110" width="240" height="50" rx="4" fill="#fbbf24" opacity="0.08" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.2"/>
  <text x="38" y="135" fill="#fcd58e" font-size="10" font-weight="600">SUBQ FAT</text>

  <!-- Muscle -->
  <rect x="30" y="160" width="240" height="40" rx="4" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1" stroke-opacity="0.2"/>
  <text x="38" y="183" fill="#fecaca" font-size="10" font-weight="600">MUSCLE</text>

  <!-- Peritoneum -->
  <rect x="30" y="200" width="240" height="8" rx="2" fill="#a78bfa" opacity="0.3" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="38" y="223" fill="#c4b5fd" font-size="10" font-weight="600">PERITONEUM</text>

  <!-- Fluid -->
  <rect x="30" y="208" width="240" height="80" rx="4" fill="#38bdf8" opacity="0.08" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.2"/>
  <text x="150" y="255" text-anchor="middle" fill="#38bdf8" font-size="12" opacity="0.5">Ascitic Fluid</text>

  <!-- Skin pulled caudally arrow -->
  <line x1="120" y1="72" x2="170" y2="72" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)" style="marker-end: url(#arrAmber)"/>
  <path d="M 120 72 L 170 72" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="170,68 180,72 170,76" fill="#f59e0b"/>
  <text x="145" y="68" text-anchor="middle" fill="#fcd58e" font-size="10" font-weight="600">Pull skin 2 cm →</text>

  <!-- Displaced skin indicator -->
  <path d="M 100 80 Q 130 78 160 80" stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="4,3"/>

  <!-- Needle - oblique path through displaced tissue -->
  <line x1="160" y1="78" x2="130" y2="240" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round"/>
  <line x1="160" y1="78" x2="165" y2="62" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round"/>
  <!-- Needle hub -->
  <rect x="157" y="55" width="16" height="12" rx="3" fill="#64748b" stroke="#94a3b8" stroke-width="1"/>

  <!-- Entry point marker -->
  <circle cx="160" cy="80" r="4" fill="#22c55e" opacity="0.8"/>

  <!-- Peritoneum entry point -->
  <circle cx="132" cy="205" r="4" fill="#a78bfa" opacity="0.8"/>

  <!-- Offset label -->
  <line x1="160" y1="90" x2="160" y2="200" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="132" y1="215" x2="132" y2="280" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="200" y="150" fill="#94a3b8" font-size="10">Skin & deep</text>
  <text x="200" y="163" fill="#94a3b8" font-size="10">entries offset</text>

  <!-- ═══ PANEL 2: After withdrawal ═══ -->
  <text x="450" y="62" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">B. AFTER WITHDRAWAL</text>

  <!-- Tissue layers - Panel 2 -->
  <!-- Skin (back to normal position) -->
  <rect x="330" y="80" width="240" height="30" rx="4" fill="#d4a574" opacity="0.3" stroke="#d4a574" stroke-width="1" stroke-opacity="0.5"/>
  <text x="338" y="100" fill="#e8b88a" font-size="10" font-weight="600">SKIN</text>

  <!-- Subcutaneous -->
  <rect x="330" y="110" width="240" height="50" rx="4" fill="#fbbf24" opacity="0.08" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.2"/>
  <text x="338" y="135" fill="#fcd58e" font-size="10" font-weight="600">SUBQ FAT</text>

  <!-- Muscle -->
  <rect x="330" y="160" width="240" height="40" rx="4" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1" stroke-opacity="0.2"/>
  <text x="338" y="183" fill="#fecaca" font-size="10" font-weight="600">MUSCLE</text>

  <!-- Peritoneum -->
  <rect x="330" y="200" width="240" height="8" rx="2" fill="#a78bfa" opacity="0.3" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="338" y="223" fill="#c4b5fd" font-size="10" font-weight="600">PERITONEUM</text>

  <!-- Fluid -->
  <rect x="330" y="208" width="240" height="80" rx="4" fill="#38bdf8" opacity="0.08" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.2"/>
  <text x="450" y="255" text-anchor="middle" fill="#38bdf8" font-size="12" opacity="0.5">Ascitic Fluid</text>

  <!-- Skin returned arrow -->
  <polygon points="430,68 420,72 430,76" fill="#22c55e"/>
  <line x1="480" y1="72" x2="432" y2="72" stroke="#22c55e" stroke-width="2"/>
  <text x="455" y="68" text-anchor="middle" fill="#bbf7d0" font-size="10" font-weight="600">← Skin released</text>

  <!-- Z-shaped sealed tract -->
  <!-- Skin entry (now shifted back) -->
  <circle cx="440" cy="87" r="5" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="1.5"/>
  <text x="452" y="90" fill="#bbf7d0" font-size="9">sealed</text>

  <!-- Tract segments - misaligned = sealed -->
  <line x1="440" y1="92" x2="440" y2="110" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="440" y1="110" x2="420" y2="130" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="420" y1="130" x2="420" y2="200" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3,2" opacity="0.4"/>

  <!-- Deep entry -->
  <circle cx="420" cy="205" r="5" fill="#a78bfa" opacity="0.3" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="432" y="208" fill="#c4b5fd" font-size="9">sealed</text>

  <!-- Self-sealing label -->
  <rect x="370" y="295" width="160" height="32" rx="8" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1"/>
  <text x="450" y="316" text-anchor="middle" fill="#bbf7d0" font-size="12" font-weight="700">SELF-SEALING TRACT</text>

  <!-- Bottom explanation -->
  <rect x="30" y="345" width="540" height="60" rx="12" fill="#1e293b" opacity="0.7"/>
  <text x="300" y="368" text-anchor="middle" fill="#e5e7eb" font-size="12" font-weight="600">Key: Pull skin 2 cm caudally before needle insertion.</text>
  <text x="300" y="386" text-anchor="middle" fill="#94a3b8" font-size="11">After needle removal, skin recoils — misaligning the entry points and preventing ascites leak.</text>
</svg>