<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="'IBM Plex Sans', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="fluidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="600" height="420" fill="url(#bg3)" rx="16"/>
  <text x="300" y="32" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="700" letter-spacing="0.08em">US-GUIDED NEEDLE ACCESS</text>

  <!-- ═══ Simulated US image frame ═══ -->
  <rect x="40" y="50" width="320" height="280" rx="12" fill="#000" stroke="#243041" stroke-width="2"/>
  <text x="55" y="72" fill="#22c55e" font-size="10" font-weight="600" opacity="0.8">ABD PARA — L CURVILINEAR</text>
  <text x="310" y="72" fill="#22c55e" font-size="9" opacity="0.6" text-anchor="end">5 MHz</text>

  <!-- US content area -->
  <rect x="50" y="80" width="300" height="240" rx="4" fill="#0a0a0a"/>

  <!-- Skin line -->
  <path d="M 50 100 Q 120 96 200 98 Q 280 100 350 97" fill="none" stroke="#a0a0a0" stroke-width="2.5" opacity="0.8"/>
  <text x="355" y="102" fill="#94a3b8" font-size="9">Skin</text>

  <!-- Subcutaneous layer - speckled -->
  <rect x="50" y="100" width="300" height="40" fill="#1a1a1a" opacity="0.8"/>
  <circle cx="80" cy="115" r="2" fill="#444" opacity="0.5"/><circle cx="120" cy="108" r="1.5" fill="#555" opacity="0.4"/>
  <circle cx="160" cy="120" r="2" fill="#444" opacity="0.5"/><circle cx="200" cy="112" r="1.5" fill="#555" opacity="0.4"/>
  <circle cx="240" cy="118" r="2" fill="#444" opacity="0.5"/><circle cx="280" cy="108" r="1.5" fill="#555" opacity="0.3"/>
  <circle cx="310" cy="125" r="2" fill="#444" opacity="0.5"/><circle cx="100" cy="128" r="1.5" fill="#555" opacity="0.4"/>
  <circle cx="180" cy="130" r="2" fill="#444" opacity="0.4"/><circle cx="260" cy="128" r="1.5" fill="#555" opacity="0.3"/>

  <!-- Muscle/fascia layer -->
  <path d="M 50 140 Q 120 138 200 140 Q 280 142 350 139" fill="none" stroke="#888" stroke-width="2" opacity="0.6"/>
  <rect x="50" y="140" width="300" height="35" fill="#1a1a1a" opacity="0.6"/>
  <circle cx="90" cy="152" r="2" fill="#555" opacity="0.4"/><circle cx="150" cy="148" r="1.5" fill="#666" opacity="0.3"/>
  <circle cx="220" cy="155" r="2" fill="#555" opacity="0.4"/><circle cx="300" cy="150" r="1.5" fill="#666" opacity="0.3"/>

  <!-- Peritoneum - bright line -->
  <path d="M 50 175 Q 120 173 200 175 Q 280 177 350 174" fill="none" stroke="#ddd" stroke-width="2.5" opacity="0.9"/>

  <!-- Ascitic fluid - anechoic (black) -->
  <rect x="50" y="177" width="300" height="100" fill="#050505"/>
  <text x="200" y="235" text-anchor="middle" fill="#333" font-size="14" font-weight="600">ANECHOIC FLUID</text>

  <!-- Bowel at bottom -->
  <ellipse cx="120" cy="290" rx="45" ry="18" fill="#2a2a2a" stroke="#666" stroke-width="1.5" opacity="0.7"/>
  <text x="120" y="294" text-anchor="middle" fill="#888" font-size="9">Bowel</text>
  <ellipse cx="270" cy="295" rx="35" ry="15" fill="#2a2a2a" stroke="#666" stroke-width="1.5" opacity="0.7"/>

  <!-- Posterior wall -->
  <path d="M 50 310 Q 200 305 350 310" fill="none" stroke="#999" stroke-width="2" opacity="0.5"/>

  <!-- Needle - bright echogenic line -->
  <line x1="80" y1="90" x2="190" y2="200" stroke="#fff" stroke-width="2.5" opacity="0.9"/>
  <!-- Needle tip artifact -->
  <circle cx="190" cy="200" r="4" fill="#fff" opacity="0.6"/>
  <circle cx="190" cy="200" r="8" fill="#fff" opacity="0.15"/>

  <!-- Depth markers on left -->
  <line x1="50" y1="100" x2="46" y2="100" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
  <text x="44" y="104" fill="#22c55e" font-size="8" text-anchor="end" opacity="0.6">1</text>
  <line x1="50" y1="140" x2="46" y2="140" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
  <text x="44" y="144" fill="#22c55e" font-size="8" text-anchor="end" opacity="0.6">2</text>
  <line x1="50" y1="180" x2="46" y2="180" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
  <text x="44" y="184" fill="#22c55e" font-size="8" text-anchor="end" opacity="0.6">3</text>
  <line x1="50" y1="220" x2="46" y2="220" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
  <text x="44" y="224" fill="#22c55e" font-size="8" text-anchor="end" opacity="0.6">4</text>
  <line x1="50" y1="260" x2="46" y2="260" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
  <text x="44" y="264" fill="#22c55e" font-size="8" text-anchor="end" opacity="0.6">5</text>

  <!-- Measurement calipers for fluid depth -->
  <line x1="310" y1="175" x2="310" y2="275" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="305" y1="175" x2="315" y2="175" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="305" y1="275" x2="315" y2="275" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="318" y="230" fill="#fcd58e" font-size="10" font-weight="600">Depth</text>

  <!-- ═══ Right side annotations ═══ -->
  <rect x="385" y="55" width="190" height="275" rx="12" fill="#1e293b" opacity="0.5" stroke="#243041" stroke-width="1"/>

  <text x="480" y="80" text-anchor="middle" fill="#e5e7eb" font-size="13" font-weight="700">Key Points</text>

  <!-- Point 1 -->
  <circle cx="400" cy="108" r="10" fill="#38bdf8" opacity="0.15"/>
  <text x="400" y="112" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="800">1</text>
  <text x="418" y="105" fill="#e5e7eb" font-size="11" font-weight="600">Visualize needle</text>
  <text x="418" y="118" fill="#94a3b8" font-size="10">tip at all times</text>

  <!-- Point 2 -->
  <circle cx="400" cy="152" r="10" fill="#38bdf8" opacity="0.15"/>
  <text x="400" y="156" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="800">2</text>
  <text x="418" y="148" fill="#e5e7eb" font-size="11" font-weight="600">Confirm anechoic</text>
  <text x="418" y="161" fill="#94a3b8" font-size="10">fluid pocket depth</text>

  <!-- Point 3 -->
  <circle cx="400" cy="196" r="10" fill="#38bdf8" opacity="0.15"/>
  <text x="400" y="200" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="800">3</text>
  <text x="418" y="192" fill="#e5e7eb" font-size="11" font-weight="600">Avoid bowel loops</text>
  <text x="418" y="205" fill="#94a3b8" font-size="10">floating in fluid</text>

  <!-- Point 4 -->
  <circle cx="400" cy="240" r="10" fill="#f59e0b" opacity="0.15"/>
  <text x="400" y="244" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="800">4</text>
  <text x="418" y="236" fill="#e5e7eb" font-size="11" font-weight="600">Measure pocket</text>
  <text x="418" y="249" fill="#94a3b8" font-size="10">≥3 cm preferred</text>

  <!-- Point 5 -->
  <circle cx="400" cy="284" r="10" fill="#22c55e" opacity="0.15"/>
  <text x="400" y="288" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="800">5</text>
  <text x="418" y="280" fill="#e5e7eb" font-size="11" font-weight="600">Color Doppler</text>
  <text x="418" y="293" fill="#94a3b8" font-size="10">to exclude vessels</text>

  <!-- Bottom bar -->
  <rect x="40" y="350" width="520" height="55" rx="12" fill="#1e293b" opacity="0.6"/>
  <text x="300" y="373" text-anchor="middle" fill="#e5e7eb" font-size="12" font-weight="600">Real-time guidance: keep needle in the plane of the US beam throughout insertion.</text>
  <text x="300" y="391" text-anchor="middle" fill="#94a3b8" font-size="11">Aspirate as you advance — flash of straw-colored fluid confirms peritoneal entry.</text>
</svg>