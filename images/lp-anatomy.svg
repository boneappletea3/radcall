<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="'IBM Plex Sans', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <rect width="700" height="520" fill="url(#bg)" rx="16"/>
  <text x="350" y="34" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="700" letter-spacing="0.08em">LUMBAR PUNCTURE — AXIAL ANATOMY &amp; NEEDLE TRAJECTORY</text>

  <!-- ═══ AXIAL CROSS-SECTION (center) ═══ -->
  <text x="250" y="64" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700">AXIAL VIEW (L3–L4 level)</text>

  <!-- Skin outline / body wall -->
  <ellipse cx="250" cy="270" rx="195" ry="170" fill="none" stroke="#d4a574" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="250" y="445" text-anchor="middle" fill="#94a3b8" font-size="9">Anterior</text>
  <text x="250" y="108" text-anchor="middle" fill="#94a3b8" font-size="9">Posterior</text>

  <!-- Paraspinal muscles -->
  <ellipse cx="200" cy="150" rx="35" ry="50" fill="#ef4444" opacity="0.06" stroke="#ef4444" stroke-width="1" stroke-opacity="0.2" transform="rotate(-10,200,150)"/>
  <ellipse cx="300" cy="150" rx="35" ry="50" fill="#ef4444" opacity="0.06" stroke="#ef4444" stroke-width="1" stroke-opacity="0.2" transform="rotate(10,300,150)"/>
  <text x="195" y="148" text-anchor="middle" fill="#fecaca" font-size="8" opacity="0.6">Paraspinal</text>
  <text x="195" y="158" text-anchor="middle" fill="#fecaca" font-size="8" opacity="0.6">muscle</text>
  <text x="305" y="148" text-anchor="middle" fill="#fecaca" font-size="8" opacity="0.6">Paraspinal</text>
  <text x="305" y="158" text-anchor="middle" fill="#fecaca" font-size="8" opacity="0.6">muscle</text>

  <!-- Spinous process -->
  <rect x="242" y="118" width="16" height="40" rx="4" fill="#e5e7eb" opacity="0.15" stroke="#e5e7eb" stroke-width="2" stroke-opacity="0.5"/>
  <text x="250" y="134" text-anchor="middle" fill="#e5e7eb" font-size="7" font-weight="700">SP</text>

  <!-- Laminae -->
  <path d="M 242 158 Q 220 170 200 185 Q 190 195 185 210" fill="none" stroke="#e5e7eb" stroke-width="3" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M 258 158 Q 280 170 300 185 Q 310 195 315 210" fill="none" stroke="#e5e7eb" stroke-width="3" stroke-opacity="0.5" stroke-linecap="round"/>
  <text x="175" y="185" fill="#e5e7eb" font-size="8" opacity="0.6" text-anchor="end">Lamina</text>
  <text x="325" y="185" fill="#e5e7eb" font-size="8" opacity="0.6">Lamina</text>

  <!-- Transverse processes -->
  <path d="M 185 210 Q 160 220 140 225" fill="none" stroke="#e5e7eb" stroke-width="3" stroke-opacity="0.4" stroke-linecap="round"/>
  <path d="M 315 210 Q 340 220 360 225" fill="none" stroke="#e5e7eb" stroke-width="3" stroke-opacity="0.4" stroke-linecap="round"/>
  <text x="130" y="240" fill="#e5e7eb" font-size="8" opacity="0.5" text-anchor="end">TP</text>
  <text x="370" y="240" fill="#e5e7eb" font-size="8" opacity="0.5">TP</text>

  <!-- Vertebral body -->
  <ellipse cx="250" cy="310" rx="55" ry="45" fill="#e5e7eb" opacity="0.1" stroke="#e5e7eb" stroke-width="2.5" stroke-opacity="0.4"/>
  <text x="250" y="314" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700" opacity="0.5">VB</text>

  <!-- Pedicles -->
  <ellipse cx="190" cy="270" rx="12" ry="18" fill="#e5e7eb" opacity="0.1" stroke="#e5e7eb" stroke-width="2" stroke-opacity="0.4"/>
  <ellipse cx="310" cy="270" rx="12" ry="18" fill="#e5e7eb" opacity="0.1" stroke="#e5e7eb" stroke-width="2" stroke-opacity="0.4"/>

  <!-- Spinal canal / thecal sac -->
  <ellipse cx="250" cy="240" rx="32" ry="38" fill="#38bdf8" opacity="0.08" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.6"/>
  <text x="250" y="232" text-anchor="middle" fill="#7dd3fc" font-size="9" font-weight="600">Thecal</text>
  <text x="250" y="244" text-anchor="middle" fill="#7dd3fc" font-size="9" font-weight="600">sac</text>
  <text x="250" y="258" text-anchor="middle" fill="#38bdf8" font-size="7" opacity="0.5">(CSF + cauda equina)</text>

  <!-- Epidural space label -->
  <path d="M 280 215 Q 295 210 310 215" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="320" y="210" fill="#fcd58e" font-size="8">Epidural space</text>

  <!-- Ligaments labeled along midline -->
  <!-- Supraspinous lig -->
  <line x1="250" y1="112" x2="250" y2="118" stroke="#22c55e" stroke-width="2" opacity="0.6"/>
  <text x="290" y="114" fill="#bbf7d0" font-size="8">Supraspinous lig.</text>

  <!-- Interspinous lig (between spinous processes) -->
  <rect x="246" y="158" width="8" height="15" rx="2" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="290" y="168" fill="#bbf7d0" font-size="8">Interspinous lig.</text>

  <!-- Ligamentum flavum -->
  <path d="M 220 195 Q 250 205 280 195" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.6"/>
  <text x="290" y="198" fill="#fcd58e" font-size="8" font-weight="600">Ligamentum flavum</text>

  <!-- ═══ NEEDLE TRAJECTORIES ═══ -->

  <!-- MIDLINE approach needle (green) -->
  <line x1="250" y1="92" x2="250" y2="210" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <circle cx="250" cy="92" r="4" fill="#22c55e" opacity="0.6"/>
  <!-- Needle tip -->
  <circle cx="250" cy="215" r="4" fill="#22c55e"/>

  <!-- OBLIQUE approach needle (amber, from left) -->
  <line x1="185" y1="105" x2="240" y2="210" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <circle cx="185" cy="105" r="4" fill="#f59e0b" opacity="0.6"/>
  <circle cx="240" cy="212" r="4" fill="#f59e0b"/>

  <!-- ═══ RIGHT PANEL: Sagittal layers ═══ -->
  <rect x="475" y="55" width="210" height="395" rx="14" fill="#1e293b" opacity="0.5" stroke="#243041" stroke-width="1"/>
  <text x="580" y="78" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">TISSUE LAYERS</text>
  <text x="580" y="93" text-anchor="middle" fill="#94a3b8" font-size="10">(Posterior → Anterior)</text>

  <!-- Layer blocks -->
  <rect x="490" y="108" width="180" height="28" rx="6" fill="#d4a574" opacity="0.15" stroke="#d4a574" stroke-width="1" stroke-opacity="0.4"/>
  <text x="580" y="126" text-anchor="middle" fill="#e8b88a" font-size="11" font-weight="600">Skin + Subcutaneous fat</text>

  <rect x="490" y="142" width="180" height="28" rx="6" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="580" y="160" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="600">Supraspinous ligament</text>

  <rect x="490" y="176" width="180" height="28" rx="6" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="580" y="194" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="600">Interspinous ligament</text>

  <rect x="490" y="210" width="180" height="32" rx="6" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="580" y="228" text-anchor="middle" fill="#fcd58e" font-size="11" font-weight="700">Ligamentum flavum</text>
  <text x="580" y="240" text-anchor="middle" fill="#94a3b8" font-size="8">"pop" felt here</text>

  <rect x="490" y="248" width="180" height="28" rx="6" fill="#a78bfa" opacity="0.08" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.4"/>
  <text x="580" y="266" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Epidural space</text>

  <rect x="490" y="282" width="180" height="28" rx="6" fill="#a78bfa" opacity="0.08" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.4"/>
  <text x="580" y="300" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Dura mater</text>

  <rect x="490" y="316" width="180" height="28" rx="6" fill="#a78bfa" opacity="0.06" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.3"/>
  <text x="580" y="334" text-anchor="middle" fill="#c4b5fd" font-size="11">Arachnoid mater</text>

  <rect x="490" y="350" width="180" height="36" rx="6" fill="#38bdf8" opacity="0.1" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="580" y="368" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="700">SUBARACHNOID SPACE</text>
  <text x="580" y="382" text-anchor="middle" fill="#38bdf8" font-size="9">(CSF + cauda equina)</text>

  <!-- Arrow showing needle target -->
  <line x1="485" y1="365" x2="495" y2="365" stroke="#22c55e" stroke-width="2"/>
  <polygon points="485,361 478,365 485,369" fill="#22c55e"/>
  <text x="475" y="369" text-anchor="end" fill="#bbf7d0" font-size="9" font-weight="700">TARGET</text>

  <!-- Depth note -->
  <rect x="490" y="396" width="180" height="42" rx="8" fill="#ef4444" opacity="0.06" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="580" y="414" text-anchor="middle" fill="#fecaca" font-size="10" font-weight="600">Anterior epidural venous plexus</text>
  <text x="580" y="428" text-anchor="middle" fill="#94a3b8" font-size="9">DO NOT advance past VB</text>

  <!-- ═══ BOTTOM LEGEND ═══ -->
  <rect x="30" y="465" width="640" height="42" rx="10" fill="#1e293b" opacity="0.7"/>
  <line x1="60" y1="486" x2="80" y2="486" stroke="#22c55e" stroke-width="2.5"/>
  <circle cx="70" cy="486" r="3" fill="#22c55e"/>
  <text x="88" y="490" fill="#bbf7d0" font-size="11">Midline approach</text>

  <line x1="240" y1="486" x2="260" y2="486" stroke="#f59e0b" stroke-width="2.5"/>
  <circle cx="250" cy="486" r="3" fill="#f59e0b"/>
  <text x="268" y="490" fill="#fcd58e" font-size="11">Oblique / paramedian approach</text>

  <text x="490" y="490" fill="#94a3b8" font-size="11">Target: L2–L3 or L3–L4 (below conus at ~L1)</text>
</svg>