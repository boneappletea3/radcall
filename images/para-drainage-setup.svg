<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="'IBM Plex Sans', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="bottleFluid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="#fbbf24" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg4)" rx="16"/>
  <text x="300" y="32" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="700" letter-spacing="0.08em">THERAPEUTIC DRAINAGE SETUP</text>

  <!-- ═══ Patient abdomen (simplified cross section) ═══ -->
  <rect x="30" y="120" width="150" height="160" rx="16" fill="#d4a574" opacity="0.1" stroke="#d4a574" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="105" y="115" text-anchor="middle" fill="#e8b88a" font-size="11" font-weight="600">ABDOMEN</text>

  <!-- Fluid inside -->
  <rect x="40" y="155" width="130" height="80" rx="8" fill="#38bdf8" opacity="0.08" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.2"/>
  <text x="105" y="200" text-anchor="middle" fill="#38bdf8" font-size="10" opacity="0.5">Ascitic Fluid</text>

  <!-- Catheter in abdomen -->
  <line x1="105" y1="195" x2="105" y2="140" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round"/>
  <circle cx="105" cy="195" r="3" fill="#22c55e"/>

  <!-- Catheter exiting skin -->
  <line x1="105" y1="140" x2="105" y2="120" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round"/>

  <!-- Hub/connector at skin -->
  <rect x="95" y="108" width="20" height="14" rx="4" fill="#64748b" stroke="#94a3b8" stroke-width="1"/>
  <text x="105" y="105" text-anchor="middle" fill="#94a3b8" font-size="9">Hub</text>

  <!-- Tubing from hub to stopcock -->
  <path d="M 115 115 Q 160 115 200 130" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>

  <!-- Stopcock -->
  <rect x="195" y="120" width="30" height="22" rx="5" fill="#38bdf8" opacity="0.2" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="210" y="135" text-anchor="middle" fill="#38bdf8" font-size="8" font-weight="700">STOP</text>
  <text x="210" y="155" text-anchor="middle" fill="#94a3b8" font-size="9">Stopcock</text>

  <!-- Branch to syringe (diagnostic) -->
  <line x1="210" y1="120" x2="210" y2="70" stroke="#94a3b8" stroke-width="2.5"/>
  <rect x="195" y="48" width="30" height="24" rx="6" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="210" y="64" text-anchor="middle" fill="#fcd58e" font-size="8" font-weight="600">60mL</text>
  <text x="250" y="58" fill="#fcd58e" font-size="10" font-weight="600">Syringe</text>
  <text x="250" y="70" fill="#94a3b8" font-size="9">(diagnostic sample)</text>

  <!-- Branch to vacuum bottles (therapeutic) -->
  <path d="M 225 131 Q 280 131 320 145" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>

  <!-- Valved connector -->
  <circle cx="280" cy="133" r="6" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.5"/>
  <text x="280" y="152" text-anchor="middle" fill="#bbf7d0" font-size="8">Valve</text>

  <!-- ═══ Vacuum bottle 1 ═══ -->
  <rect x="320" y="90" width="60" height="100" rx="8" fill="#111" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Bottle cap -->
  <rect x="335" y="82" width="30" height="12" rx="4" fill="#64748b"/>
  <!-- Fluid level -->
  <rect x="323" y="140" width="54" height="47" rx="4" fill="url(#bottleFluid)"/>
  <text x="350" y="125" text-anchor="middle" fill="#94a3b8" font-size="9">1 L</text>
  <!-- Tubing in -->
  <line x1="320" y1="145" x2="350" y2="88" stroke="#94a3b8" stroke-width="2"/>

  <!-- Vacuum bottle 2 -->
  <rect x="400" y="90" width="60" height="100" rx="8" fill="#111" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="415" y="82" width="30" height="12" rx="4" fill="#64748b"/>
  <rect x="403" y="155" width="54" height="32" rx="4" fill="url(#bottleFluid)"/>
  <text x="430" y="125" text-anchor="middle" fill="#94a3b8" font-size="9">1 L</text>
  <!-- Connection line between bottles -->
  <line x1="380" y1="130" x2="400" y2="130" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Vacuum bottle 3 (empty) -->
  <rect x="480" y="90" width="60" height="100" rx="8" fill="#111" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <rect x="495" y="82" width="30" height="12" rx="4" fill="#64748b" opacity="0.5"/>
  <text x="510" y="135" text-anchor="middle" fill="#94a3b8" font-size="9" opacity="0.5">1 L</text>
  <line x1="460" y1="130" x2="480" y2="130" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3" opacity="0.5"/>

  <text x="430" y="210" text-anchor="middle" fill="#94a3b8" font-size="11">Vacuum bottles (1 L each)</text>

  <!-- ═══ Specimen tubes area ═══ -->
  <rect x="30" y="300" width="170" height="80" rx="12" fill="#1e293b" opacity="0.5" stroke="#243041" stroke-width="1"/>
  <text x="115" y="322" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">Specimen Tubes</text>

  <!-- Mini tube icons -->
  <rect x="50" y="335" width="12" height="30" rx="4" fill="#a78bfa" opacity="0.3" stroke="#a78bfa" stroke-width="1"/>
  <text x="56" y="375" text-anchor="middle" fill="#c4b5fd" font-size="8">Cell ct</text>

  <rect x="80" y="335" width="12" height="30" rx="4" fill="#38bdf8" opacity="0.3" stroke="#38bdf8" stroke-width="1"/>
  <text x="86" y="375" text-anchor="middle" fill="#7dd3fc" font-size="8">Alb</text>

  <rect x="110" y="335" width="12" height="30" rx="4" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="1"/>
  <text x="116" y="375" text-anchor="middle" fill="#bbf7d0" font-size="8">Prot</text>

  <rect x="140" y="335" width="12" height="30" rx="4" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="1"/>
  <text x="146" y="375" text-anchor="middle" fill="#fecaca" font-size="8">Cx</text>

  <rect x="170" y="335" width="12" height="30" rx="4" fill="#fbbf24" opacity="0.3" stroke="#fbbf24" stroke-width="1"/>
  <text x="176" y="375" text-anchor="middle" fill="#fcd58e" font-size="8">Cyto</text>

  <!-- ═══ Albumin infusion reminder ═══ -->
  <rect x="230" y="300" width="340" height="80" rx="12" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="400" y="324" text-anchor="middle" fill="#fcd58e" font-size="12" font-weight="700">ALBUMIN REPLACEMENT (if >5 L removed)</text>
  <text x="400" y="344" text-anchor="middle" fill="#e5e7eb" font-size="11">25% Albumin: 6–8 g per liter of fluid removed</text>
  <text x="400" y="362" text-anchor="middle" fill="#94a3b8" font-size="11">Begin during or immediately after drainage</text>

  <!-- Flow arrows -->
  <text x="105" y="250" text-anchor="middle" fill="#22c55e" font-size="18">↑</text>
  <text x="105" y="267" text-anchor="middle" fill="#94a3b8" font-size="9">Fluid out</text>

  <!-- "Gravity assisted" note -->
  <text x="350" y="55" fill="#94a3b8" font-size="10" font-style="italic">Place bottles below patient level</text>
</svg>