<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" font-family="'IBM Plex Sans', system-ui, sans-serif">
  <defs>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d0a9"/>
      <stop offset="100%" stop-color="#e8b88a"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="700" letter-spacing="0.08em">PARACENTESIS ACCESS SITE</text>

  <!-- Abdomen outline -->
  <ellipse cx="300" cy="260" rx="220" ry="190" fill="url(#skin)" opacity="0.15" stroke="#f5d0a9" stroke-width="2" stroke-opacity="0.4"/>

  <!-- Midline (linea alba) -->
  <line x1="300" y1="80" x2="300" y2="440" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.5"/>
  <text x="308" y="96" fill="#94a3b8" font-size="11" opacity="0.7">Midline</text>

  <!-- Umbilicus -->
  <circle cx="300" cy="220" r="10" fill="none" stroke="#e8b88a" stroke-width="2" opacity="0.6"/>
  <text x="318" y="224" fill="#94a3b8" font-size="11">Umbilicus</text>

  <!-- Rectus sheath boundaries (linea semilunaris) -->
  <path d="M 245 100 Q 240 260 250 420" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <path d="M 355 100 Q 360 260 350 420" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="268" y="130" fill="#ef4444" font-size="10" opacity="0.8" transform="rotate(-5,268,130)">Linea</text>
  <text x="262" y="143" fill="#ef4444" font-size="10" opacity="0.8" transform="rotate(-5,262,143)">semilunaris</text>

  <!-- Rectus abdominis shading -->
  <rect x="248" y="140" width="50" height="260" rx="8" fill="#ef4444" opacity="0.06"/>
  <rect x="302" y="140" width="50" height="260" rx="8" fill="#ef4444" opacity="0.06"/>
  <text x="273" y="290" fill="#fecaca" font-size="9" text-anchor="middle" opacity="0.6">Rectus</text>
  <text x="327" y="290" fill="#fecaca" font-size="9" text-anchor="middle" opacity="0.6">Rectus</text>

  <!-- Inferior epigastric arteries -->
  <path d="M 270 390 Q 265 320 272 180" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <path d="M 330 390 Q 335 320 328 180" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <text x="260" y="175" fill="#ef4444" font-size="9" text-anchor="end" font-weight="600">IEA</text>
  <text x="340" y="175" fill="#ef4444" font-size="9" font-weight="600">IEA</text>

  <!-- ASIS landmarks -->
  <circle cx="160" cy="380" r="8" fill="#f59e0b" opacity="0.8"/>
  <text x="160" y="405" text-anchor="middle" fill="#fcd58e" font-size="12" font-weight="700">ASIS</text>
  <text x="160" y="418" text-anchor="middle" fill="#94a3b8" font-size="10">(Left)</text>

  <circle cx="440" cy="380" r="8" fill="#f59e0b" opacity="0.8"/>
  <text x="440" y="405" text-anchor="middle" fill="#fcd58e" font-size="12" font-weight="700">ASIS</text>
  <text x="440" y="418" text-anchor="middle" fill="#94a3b8" font-size="10">(Right)</text>

  <!-- Measurement lines from left ASIS to access site -->
  <!-- 3cm medial -->
  <line x1="160" y1="375" x2="200" y2="355" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="200" y1="355" x2="200" y2="345" stroke="#38bdf8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="172" y="360" fill="#38bdf8" font-size="11" font-weight="600">3 cm</text>
  <text x="168" y="373" fill="#38bdf8" font-size="9">medial</text>

  <!-- 3cm superior -->
  <line x1="200" y1="370" x2="200" y2="340" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="208" y="352" fill="#38bdf8" font-size="11" font-weight="600">3 cm</text>
  <text x="208" y="365" fill="#38bdf8" font-size="9">superior</text>

  <!-- ACCESS SITE - LLQ (preferred) -->
  <circle cx="200" cy="335" r="14" fill="#22c55e" opacity="0.25" stroke="#22c55e" stroke-width="2.5"/>
  <circle cx="200" cy="335" r="5" fill="#22c55e"/>
  <line x1="218" y1="328" x2="260" y2="310" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="260" y="295" width="130" height="36" rx="8" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1"/>
  <text x="325" y="312" text-anchor="middle" fill="#bbf7d0" font-size="12" font-weight="700">LLQ ACCESS</text>
  <text x="325" y="325" text-anchor="middle" fill="#22c55e" font-size="10">(Preferred)</text>

  <!-- ACCESS SITE - RLQ (alternative) -->
  <circle cx="400" cy="335" r="12" fill="#38bdf8" opacity="0.15" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="400" cy="335" r="4" fill="#38bdf8" opacity="0.6"/>

  <!-- Measurement from right ASIS -->
  <line x1="440" y1="375" x2="400" y2="340" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <line x1="404" y1="328" x2="430" y2="310" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
  <text x="435" y="308" fill="#38bdf8" font-size="10" opacity="0.7">RLQ (Alt)</text>

  <!-- Legend -->
  <rect x="20" y="445" width="560" height="45" rx="10" fill="#1e293b" opacity="0.7"/>
  <circle cx="45" cy="467" r="5" fill="#22c55e"/>
  <text x="58" y="471" fill="#bbf7d0" font-size="11">Ideal access (lateral to rectus)</text>
  <line x1="240" y1="467" x2="260" y2="467" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <text x="268" y="471" fill="#fecaca" font-size="11">Inf. epigastric a. (avoid)</text>
  <circle cx="450" cy="467" r="5" fill="#f59e0b" opacity="0.8"/>
  <text x="463" y="471" fill="#fcd58e" font-size="11">ASIS landmark</text>
</svg>