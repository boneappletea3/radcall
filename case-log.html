/* ── Data Loading ── */
let all = [];
let _supabaseReady = false;

async function loadCases() {
  if (_supabaseReady && window.RadCallAuth) {
    const user = RadCallAuth.getUser();
    if (user) {
      const { data, error } = await RadCallAuth.supabase
        .from('cases')
        .select('*')
        .order('date', { ascending: false });
      if (data && !error) {
        all = data.map(mapDbToDisplay);
        buildSidebar();
        run();
        return;
      }
    }
  }
  // Fallback to embedded data
  all = CASES_FALLBACK.filter(c => c['Procedure'] || c['ACGME Procedure Category']);
  buildSidebar();
  run();
}

/* ── Auth Gate ── */
async function initApp() {
  // Check if Supabase is configured
  if (window.RadCallAuth && !RadCallAuth._notConfigured && RadCallAuth.supabase) {
    try {
      _supabaseReady = true;
      const user = await RadCallAuth.requireAuth();
      if (user) {
        await loadCases();
        return;
      }
    } catch (e) {
      console.warn('Supabase auth error, using fallback data:', e);
    }
  }
  // Fallback: load embedded data (works without Supabase)
  _supabaseReady = false;
  loadCases();
}

function decodeAnesthetic(raw) {
  if (!raw || !String(raw).trim()) return '';
  var s = String(raw).trim();
  // Pass-through clean labels
  var clean = {GA:1,MAC:1,Local:1,'Local + fentanyl':1,Lidocaine:1,'Topical lidocaine':1,
               Anesthesia:1,Anes:1,General:1,general:1,local:1,Moderate:1,
               'Dilaudid 0.5mg':1,'f25mcg bedside':'Fentanyl 25mcg'};
  if (clean[s] === 1) return s;
  if (clean[s]) return clean[s];
  if (s.toLowerCase() === 'general' || s.toLowerCase() === 'anesthesia' || s.toLowerCase() === 'anes') return 'GA';
  if (s.toLowerCase() === 'local') return 'Local';

  // Normalize: lowercase, remove spaces
  var w = s.toLowerCase().replace(/\s+/g,'');

  // Fix known typos/edge cases before parsing
  // '0.5mgf25mcg' -> leading versed missing v
  if (/^\d/.test(w)) w = 'v' + w;
  // 'v1mg100mcgf' reversed fentanyl -> swap to v1mgf100mcg
  w = w.replace(/v(\d+\.?\d*mg)(\d+\.?\d*mcg)f$/, 'v$1f$2');
  // 'v2g100mcg' -> v2mgf100mcg (missing mg unit and f)
  w = w.replace(/v(\d+\.?\d*)g(\d+mcg)$/, 'v$1mg f$2');
  // vXmgvYmcg -> second v is typo for f (v0.5mgv25mcg, v2.5mgv150mcg)
  w = w.replace(/v(\d+\.?\d*mg)v(\d+\.?\d*m)/, 'v$1f$2');

  var parts = [];
  var i = 0;
  while (i < w.length) {
    // fentanyl
    if (w[i] === 'f' && i+1 < w.length && /\d/.test(w[i+1])) {
      var m = w.slice(i).match(/^f(\d+\.?\d*)(mcg|mg)?/);
      if (m) {
        var unit = (m[2] && m[2] === 'mg') ? 'mg' : 'mcg';
        parts.push('Fentanyl ' + m[1] + unit);
        i += m[0].length; continue;
      }
    }
    // versed
    if (w[i] === 'v' && i+1 < w.length && /\d/.test(w[i+1])) {
      var m = w.slice(i).match(/^v(\d+\.?\d*)(mg|mcg|g)?/);
      if (m) {
        var unit = (!m[2] || m[2] === 'g') ? 'mg' : m[2];
        parts.push('Versed ' + m[1] + unit);
        i += m[0].length; continue;
      }
    }
    // dilaudid shorthand 'd'
    if (w[i] === 'd' && i+1 < w.length && /\d/.test(w[i+1])) {
      var m = w.slice(i).match(/^d(\d+\.?\d*)(mg)?/);
      if (m) { parts.push('Dilaudid ' + m[1] + 'mg'); i += m[0].length; continue; }
    }
    // written dilaudid
    if (w.slice(i).startsWith('dilaudid')) {
      var m = w.slice(i).match(/^dilaudid\s*(\d+\.?\d*)\s*(mg)?/);
      if (m) { parts.push('Dilaudid ' + m[1] + 'mg'); i += m[0].length; continue; }
    }
    // benadryl
    if (w.slice(i).startsWith('benadryl')) {
      var m = w.slice(i).match(/^benadryl\s*(\d+\.?\d*)\s*(mg)?/);
      if (m) { parts.push('Benadryl ' + m[1] + 'mg'); i += m[0].length; continue; }
    }
    i++; // skip unknown chars
  }
  return parts.length ? parts.join(', ') : s;
}
let filtered = [];
let state = { cat: '', hosp: '', type: '', q: '' };

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// SIDEBAR
function buildSidebar() {
  const catMap = {}, hospMap = {};
  all.forEach(c => {
    const cat = (c['ACGME Procedure Category']||'').trim();
    if (cat) catMap[cat] = (catMap[cat]||0)+1;
    const h = c['Hospital']||'';
    if (h) hospMap[h] = (hospMap[h]||0)+1;
  });
  const cats = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const hosps = Object.entries(hospMap).sort((a,b)=>b[1]-a[1]);
  const vCount = all.filter(c=>c['Procedure Type']==='Vascular Intervention').length;
  const nCount = all.filter(c=>c['Procedure Type']==='Nonvascular Intervention').length;

  const sb = document.getElementById('sidebar');
  sb.innerHTML = `
    <div class="sidebar-heading">Procedure Type</div>
    ${fBtn('type','','All Cases',all.length)}
    ${fBtn('type','Vascular Intervention','Vascular',vCount)}
    ${fBtn('type','Nonvascular Intervention','Nonvascular',nCount)}
    <div class="divider"></div>
    <div class="sidebar-heading">ACGME Category</div>
    ${fBtn('cat','','All Categories',all.length)}
    ${cats.map(([c,n])=>fBtn('cat',c,c,n)).join('')}
    <div class="divider"></div>
    <div class="sidebar-heading">Hospital</div>
    ${fBtn('hosp','','All Hospitals',all.length)}
    ${hosps.map(([h,n])=>fBtn('hosp',h,h,n)).join('')}
  `;
}

function fBtn(field, val, name, count) {
  const active = state[field] === val ? 'active' : '';
  return `<button class="filter-item ${active}" data-field="${esc(field)}" data-val="${esc(val)}">
    <span class="filter-name">${esc(name)}</span>
    <span class="filter-count">${count}</span>
  </button>`;
}

// Use event delegation — no inline onclick needed
document.getElementById('sidebar').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-item');
  if (!btn) return;
  const field = btn.dataset.field;
  const val = btn.dataset.val;
  setFilter(field, val);
});

function setFilter(field, val) {
  state[field] = (state[field] === val) ? '' : val;
  buildSidebar();
  renderActiveChips();
  run();
}

function run() {
  let data = [...all];
  if (state.type) data = data.filter(c => c['Procedure Type'] === state.type);
  if (state.cat)  data = data.filter(c => (c['ACGME Procedure Category']||'').trim() === state.cat);
  if (state.hosp) data = data.filter(c => c['Hospital'] === state.hosp);
  if (state.q) {
    const q = state.q.toLowerCase();
    data = data.filter(c =>
      (c['Procedure']||'').toLowerCase().includes(q) ||
      (c['Technique']||'').toLowerCase().includes(q) ||
      (c['Notes']||'').toLowerCase().includes(q) ||
      (c['Implant(s)']||'').toLowerCase().includes(q) ||
      (c['ACGME Procedure Category']||'').toLowerCase().includes(q) ||
      (c['Attending']||'').toLowerCase().includes(q)
    );
  }
  const sort = document.getElementById('sortSelect').value;
  if (sort==='date-desc') data.sort((a,b)=>(b['Date']||'').localeCompare(a['Date']||''));
  else if (sort==='date-asc') data.sort((a,b)=>(a['Date']||'').localeCompare(b['Date']||''));
  else if (sort==='proc-asc') data.sort((a,b)=>(a['Procedure']||'').localeCompare(b['Procedure']||''));
  else if (sort==='cat-asc') data.sort((a,b)=>(a['ACGME Procedure Category']||'').localeCompare(b['ACGME Procedure Category']||''));
  filtered = data;
  renderResults();
}

function renderActiveChips() {
  const af = document.getElementById('activeFilters');
  const chips = [];
  if (state.type) chips.push([state.type.replace(' Intervention',''), 'type']);
  if (state.cat)  chips.push([state.cat.length>32 ? state.cat.substring(0,30)+'…' : state.cat, 'cat']);
  if (state.hosp) chips.push([state.hosp, 'hosp']);
  if (state.q)    chips.push(['"'+state.q+'"', 'q']);
  af.innerHTML = chips.map(([label, field])=>
    `<div class="active-chip">${esc(label)}<span class="chip-clear" data-clear="${esc(field)}">×</span></div>`
  ).join('');
}

document.getElementById('activeFilters').addEventListener('click', function(e) {
  const btn = e.target.closest('.chip-clear');
  if (!btn) return;
  const field = btn.dataset.clear;
  state[field] = '';
  if (field === 'q') document.getElementById('search').value = '';
  buildSidebar();
  renderActiveChips();
  run();
});

function renderResults() {
  document.getElementById('resultCount').textContent = filtered.length.toLocaleString();
  document.getElementById('navCount').textContent = filtered.length.toLocaleString();
  const el = document.getElementById('results');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>No cases found</h3><p>Try a different search term or clear your filters.</p></div>`;
    return;
  }
  el.innerHTML = filtered.map((c, i) => {
    const cat = (c['ACGME Procedure Category']||'').trim();
    
    const isVasc = c['Procedure Type'] === 'Vascular Intervention';
    const hasNotes = (c['Notes']||'').trim().length > 3;
    const hasCompl = (c['SIR Grade']||'').trim().length > 0;
    const date = (c['Date']||'').substring(0,10);
    const delay = Math.min(i * 0.025, 0.4);
    const cls = ['case-card', hasCompl?'has-complication':'', hasNotes?'has-tips':''].filter(Boolean).join(' ');
    return `<div class="${cls}" style="animation-delay:${delay}s" data-idx="${i}">
      <div class="card-top">
        <span class="card-emoji"></span>
        <div class="card-title-wrap">
          <div class="card-title">${esc(c['Procedure'] || cat || 'Procedure')}</div>
          <div class="card-cat">${esc(cat)}</div>
        </div>
      </div>
      <div class="card-tags">
        ${c['Hospital'] ? `<span class="tag tag-hosp">${esc(c['Hospital'])}</span>` : ''}
        <span class="tag ${isVasc?'tag-type-v':'tag-type-n'}">${isVasc?'Vascular':'Nonvasc'}</span>
        ${c['Attending'] ? `<span class="tag tag-attending">Dr. ${esc(c['Attending'])}</span>` : ''}
        ${hasCompl ? `<span class="tag tag-complication">Complication</span>` : ''}
        ${hasNotes ? `<span class="tag tag-tips">Tips</span>` : ''}
        ${date ? `<span class="tag tag-date">${date}</span>` : ''}
      </div>
      ${c['Technique'] ? `<div class="card-technique">${esc(c['Technique'])}</div>` : ''}
      ${hasNotes ? `<div class="card-peek-notes">${esc((c['Notes']||'').trim())}</div>` : ''}
    </div>`;
  }).join('');
}

document.getElementById('results').addEventListener('click', function(e) {

function openDrawer(idx) {
  const c = filtered[idx];
  if (!c) return;
  const cat = (c['ACGME Procedure Category']||'').trim();
  
  const isVasc = c['Procedure Type'] === 'Vascular Intervention';
  const date = (c['Date']||'').substring(0,10);
  const stats = [
    ['Hospital', c['Hospital']],
    ['Date', date],
    ['Attending', c['Attending'] ? 'Dr. '+c['Attending'] : ''],
    ['Case Time', c['Case Time (min)'] ? c['Case Time (min)']+' min' : ''],
    ['Fluoro Time', c['Fluoro Time (min)'] ? c['Fluoro Time (min)']+' min' : ''],
    ['Radiation', c['Radiation Dose (mGy)'] ? String(c['Radiation Dose (mGy)']) : ''],
    ['Contrast', c['Contrast Volume (mL)'] ? c['Contrast Volume (mL)']+' mL' : ''],
    ['Anesthetic', decodeAnesthetic(c['Anesthetic Dose']||'')],
    ['Accession', c['Accession']||''],
  ].filter(([,v])=>v&&String(v).trim());

  document.getElementById('drawerContent').innerHTML = `
    <div class="drawer-hero">
      <button class="drawer-close" id="drawerCloseBtn">×</button>
      <span class="drawer-emoji"></span>
      <div class="drawer-cat">${esc(cat)}</div>
      <div class="drawer-title">${esc(c['Procedure'] || 'Procedure')}</div>
      <div class="drawer-meta">
        ${c['Hospital'] ? `<span class="tag tag-hosp">${esc(c['Hospital'])}</span>` : ''}
        <span class="tag ${isVasc?'tag-type-v':'tag-type-n'}">${isVasc?'Vascular':'Nonvascular'}</span>
        ${c['Attending'] ? `<span class="tag tag-attending">Dr. ${esc(c['Attending'])}</span>` : ''}
        ${date ? `<span class="tag tag-date">${date}</span>` : ''}
      </div>
    </div>
    <div class="drawer-body">
      ${c['Technique'] ? mkSection('blue','Technique',c['Technique'],'') : ''}
      ${c['Implant(s)'] ? mkSection('green','Implants & Materials',c['Implant(s)'],'implants-block') : ''}
      ${(c['Notes']||'').trim() ? mkSection('amber','Tips & Pearls',c['Notes'],'notes-block') : ''}
      ${(c['SIR Grade']||'').trim() ? mkSection('red','Complication',c['SIR Grade'],'complication-block') : ''}
      ${stats.length ? `<div class="section">
        <div class="section-header"><div class="section-icon purple"></div><div class="section-label">Case Details</div></div>
        <div class="stats-grid">${stats.map(([k,v])=>`<div class="stat-box"><div class="label">${esc(k)}</div><div class="value">${esc(String(v))}</div></div>`).join('')}</div>
      </div>` : ''}
    </div>`;

  document.getElementById('drawerCloseBtn').onclick = closeDrawer;
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function mkSection(color, label, text, extra) {
  return `<div class="section">
    <div class="section-header"><div class="section-icon ${color}"></div><div class="section-label">${label}</div></div>
    <div class="content-block ${extra}">${esc((text||'').trim())}</div>
  </div>`;
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);

let searchTimer;
document.getElementById('search').addEventListener('input', e => {

document.addEventListener('keydown', e => {

/* ── Dashboard ── */
function renderDashboard() {
  const el = document.getElementById('dashboardView');
  const now = new Date();
  const thisMonth = all.filter(c => {
    const d = c['Date'];
    return d && d.substring(0,7) === now.toISOString().substring(0,7);
  }).length;
  const thisYear = all.filter(c => {
    const d = c['Date'];
    return d && d.substring(0,4) === String(now.getFullYear());
  }).length;
  const uniqueProcs = new Set(all.map(c => c['Procedure']).filter(Boolean)).size;

  // ACGME category counts
  const acgmeCounts = {};
  ACGME_IR_CATEGORIES.forEach(cat => { acgmeCounts[cat.name] = 0; });
  all.forEach(c => {
    const mapped = mapToAcgmeCategory(c['ACGME Procedure Category']);
    if (mapped && acgmeCounts.hasOwnProperty(mapped)) acgmeCounts[mapped]++;
  });

  // Monthly histogram (last 12 months)
  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = d.toISOString().substring(0,7);
    const label = d.toLocaleString('default', { month: 'short' });
    const count = all.filter(c => (c['Date']||'').substring(0,7) === key).length;
    months.push({ key, label, count });
  }
  const maxMonth = Math.max(...months.map(m => m.count), 1);

  el.innerHTML = `
    <div class="dash-summary">
      <div class="dash-stat"><div class="dash-stat-val">${all.length}</div><div class="dash-stat-label">Total Cases</div></div>
      <div class="dash-stat"><div class="dash-stat-val">${thisMonth}</div><div class="dash-stat-label">This Month</div></div>
      <div class="dash-stat"><div class="dash-stat-val">${thisYear}</div><div class="dash-stat-label">This Year</div></div>
      <div class="dash-stat"><div class="dash-stat-val">${uniqueProcs}</div><div class="dash-stat-label">Unique Procedures</div></div>
    </div>
    <div class="dash-section-title">ACGME IR Independent Categories</div>
    <div class="acgme-grid">
      ${ACGME_IR_CATEGORIES.map(cat => {
        const count = acgmeCounts[cat.name] || 0;
        const target = cat.minCases || 0;
        const pct = target ? Math.min(100, Math.round(count / target * 100)) : 0;
        return `<div class="acgme-card">
          <div class="acgme-card-top">
            <span class="acgme-card-name">${esc(cat.shortName)}</span>
            <span class="acgme-card-count">${count}${target ? ' / '+target : ''}</span>
          </div>
          <div class="acgme-bar-wrap"><div class="acgme-bar" style="width:${target ? pct : Math.min(100, count)}%"></div></div>
        </div>`;
      }).join('')}
    </div>
    <div class="dash-section-title">Cases Per Month (Last 12 Months)</div>
    <div class="monthly-grid">
      ${months.map(m => `<div class="month-bar-col">
        <div class="month-bar-wrap"><div class="month-bar" style="height:${Math.round(m.count/maxMonth*100)}%"></div></div>
        <div class="month-label">${m.label}</div>
      </div>`).join('')}
    </div>
  `;
}

  const btn = document.getElementById('cfSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  const caseData = {
    'Date': document.getElementById('cfDate').value,
    'Hospital': document.getElementById('cfHospital').value,
    'Procedure': document.getElementById('cfProcedure').value,
    'Procedure Type': document.getElementById('cfProcType').value,
    'ACGME Procedure Category': document.getElementById('cfAcgme').value,
    'CPT Codes': document.getElementById('cfCptCodes').value,
    'Technique': document.getElementById('cfTechnique').value,
    'Attending': document.getElementById('cfAttending').value,
    'Accession': document.getElementById('cfAccession').value,
    'Implant(s)': document.getElementById('cfImplants').value,
    'Case Time (min)': document.getElementById('cfCaseTime').value,
    'Fluoro Time (min)': document.getElementById('cfFluoroTime').value,
    'Radiation Dose (mGy)': document.getElementById('cfRadDose').value,
    'Contrast Volume (mL)': document.getElementById('cfContrast').value,
    'Anesthetic Dose': document.getElementById('cfAnesthetic').value,
    'SIR Grade': document.getElementById('cfSirGrade').value,
    'Complication Narrative': document.getElementById('cfComplication').value,
    'Notes': document.getElementById('cfNotes').value,
  };

  if (_supabaseReady && window.RadCallAuth) {
    const user = RadCallAuth.getUser();
    if (user) {
      const dbRow = mapDisplayToDb(caseData, user.id);
      if (editingCaseId) {
        await RadCallAuth.supabase.from('cases').update(dbRow).eq('id', editingCaseId);
      } else {
        await RadCallAuth.supabase.from('cases').insert(dbRow);
      }
      await loadCases();
    }
  } else {
    // Fallback: add to in-memory array
    all.unshift(caseData);
    buildSidebar();
    run();
  }

  btn.disabled = false;
  btn.textContent = 'Save Case';
  closeCaseForm();
});

// Auto-fill CPT codes when ACGME category changes
document.getElementById('cfAcgme').addEventListener('change', function() {
  const cat = this.value;
  if (window.ACGME_IR_CATEGORIES) {
    const match = ACGME_IR_CATEGORIES.find(c =>
      cat.toLowerCase().includes(c.shortName.toLowerCase()) ||
      c.name.toLowerCase().includes(cat.toLowerCase().split(',')[0])
    );
    if (match && match.cptCodes.length) {
      const cptInput = document.getElementById('cfCptCodes');
      if (!cptInput.value) cptInput.value = match.cptCodes.slice(0, 3).join(', ');
    }
  }
});

function getCPTCode(category, procedure) {
  const text = ((category || '') + ' ' + (procedure || '')).toLowerCase();
  const sorted = Object.keys(CPT_LOOKUP).sort((a, b) => b.length - a.length);
  for (const key of sorted) {
    if (text.includes(key)) return CPT_LOOKUP[key];
  }
  return '';
}

function openExportModal() {
  // Build year list from current cases
  const years = [...new Set(all.map(c => {
    const d = c['Date'] || '';
    return d.substring(0, 4);
  }).filter(Boolean))].sort((a,b) => b - a);

  const yearListEl = document.getElementById('exportYearList');
  yearListEl.innerHTML = years.map(y =>
    `<label><input type="checkbox" class="export-year-cb" value="${y}" checked>${y}</label>`
  ).join('');

  document.getElementById('exportRangeYear').addEventListener('change', updateYearVis);
  document.getElementById('exportRangeAll').addEventListener('change', updateYearVis);
  updateYearVis();

  document.getElementById('exportModalOverlay').classList.add('open');
}

function updateYearVis() {
  const byYear = document.getElementById('exportRangeYear').checked;
  document.getElementById('exportYearList').style.display = byYear ? 'flex' : 'none';
}

function closeExportModal(e) {
  if (e && e.target !== document.getElementById('exportModalOverlay')) return;
  document.getElementById('exportModalOverlay').classList.remove('open');
}

function runExport() {
  const fmt = document.querySelector('input[name="exportFmt"]:checked').value;
  const rangeAll = document.getElementById('exportRangeAll').checked;
  const includeCpt = document.getElementById('exportCptCheck').checked;

  let cases = all.slice();

  if (!rangeAll) {
    const selectedYears = [...document.querySelectorAll('.export-year-cb:checked')].map(cb => cb.value);
    cases = cases.filter(c => {
      const y = (c['Date'] || '').substring(0, 4);
      return selectedYears.includes(y);
    });
  }

  document.getElementById('exportModalOverlay').classList.remove('open');

  if (fmt === 'xml') {
    exportXML(cases, includeCpt);
  } else {
    exportPDF(cases, includeCpt);
  }
}

function xmlEscape(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function exportXML(cases, includeCpt) {
  const today = new Date().toISOString().slice(0, 10);
  let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<CaseLog exported="${today}" totalCases="${cases.length}">\n`;
  for (const c of cases) {
    const cpt = includeCpt ? getCPTCode(c['ACGME Procedure Category'], c['Procedure']) : '';
    xml += `  <Case>\n`;
    xml += `    <Date>${xmlEscape(c['Date'])}</Date>\n`;
    xml += `    <Hospital>${xmlEscape(c['Hospital'])}</Hospital>\n`;
    xml += `    <Accession>${xmlEscape(c['Accession'])}</Accession>\n`;
    xml += `    <ProcedureType>${xmlEscape(c['Procedure Type'])}</ProcedureType>\n`;
    xml += `    <ACGMECategory>${xmlEscape(c['ACGME Procedure Category'])}</ACGMECategory>\n`;
    xml += `    <Procedure>${xmlEscape(c['Procedure'])}</Procedure>\n`;
    if (includeCpt) xml += `    <CPTCode>${xmlEscape(cpt)}</CPTCode>\n`;
    xml += `    <Attending>${xmlEscape(c['Attending'])}</Attending>\n`;
    xml += `    <Technique>${xmlEscape(c['Technique'])}</Technique>\n`;
    xml += `    <FluoroTime>${xmlEscape(c['Fluoro Time (min)'])}</FluoroTime>\n`;
    xml += `    <ContrastVolume>${xmlEscape(c['Contrast Volume (mL)'])}</ContrastVolume>\n`;
    xml += `    <RadiationDose>${xmlEscape(c['Radiation Dose (mGy)'])}</RadiationDose>\n`;
    xml += `    <Complications>${xmlEscape(c['Complication Narrative'])}</Complications>\n`;
    xml += `    <SIRGrade>${xmlEscape(c['SIR Grade'])}</SIRGrade>\n`;
    xml += `    <Notes>${xmlEscape(c['Notes'])}</Notes>\n`;
    xml += `  </Case>\n`;
  }
  xml += `</CaseLog>`;

  const blob = new Blob([xml], { type: 'application/xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `case-log-${new Date().toISOString().slice(0,10)}.xml`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function exportPDF(cases, includeCpt) {
  const today = new Date().toISOString().slice(0, 10);
  const cols = ['Date','Hospital','ACGME Procedure Category','Procedure','Attending','Fluoro Time (min)','Contrast Volume (mL)','Radiation Dose (mGy)','SIR Grade'];
  if (includeCpt) cols.splice(4, 0, 'CPT Code');

  let rows = cases.map(c => {
    const row = {
      'Date': c['Date'] || '',
      'Hospital': c['Hospital'] || '',
      'ACGME Procedure Category': c['ACGME Procedure Category'] || '',
      'Procedure': c['Procedure'] || '',
      'Attending': c['Attending'] || '',
      'Fluoro Time (min)': c['Fluoro Time (min)'] || '',
      'Contrast Volume (mL)': c['Contrast Volume (mL)'] || '',
      'Radiation Dose (mGy)': c['Radiation Dose (mGy)'] || '',
      'SIR Grade': c['SIR Grade'] || '',
    };
    if (includeCpt) row['CPT Code'] = getCPTCode(c['ACGME Procedure Category'], c['Procedure']);
    return row;
  });

  const wrap = document.getElementById('printExportWrap');
  wrap.innerHTML = `<h1>Case Log Export — ${today} (${cases.length} cases)</h1>
    <table>
      <thead><tr>${cols.map(h => `<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r => `<tr>${cols.map(c => `<td>${r[c] || ''}</td>`).join('')}</tr>`).join('')}</tbody>
    </table>`;
  wrap.style.display = 'block';
  window.print();
  setTimeout(() => { wrap.style.display = 'none'; wrap.innerHTML = ''; }, 500);
}
