<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedure Log — RadCall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #0b0f14;
  --warm-white: #111620;
  --slate: #e2e8f0;
  --slate-mid: #94a3b8;
  --slate-light: #cbd5e1;
  --muted: #64748b;
  --border: #1e2737;
  --border-strong: #2a3444;
  --teal: #14b8a6;
  --teal-light: rgba(20,184,166,0.1);
  --teal-mid: #2dd4bf;
  --amber: #f59e0b;
  --amber-light: rgba(245,158,11,0.1);
  --amber-mid: #fbbf24;
  --red: #ef4444;
  --red-light: rgba(239,68,68,0.08);
  --green: #22c55e;
  --green-light: rgba(34,197,94,0.1);
  --purple: #a855f7;
  --purple-light: rgba(168,85,247,0.1);
  --card-shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --card-shadow-hover: 0 4px 16px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  background: var(--cream);
  color: var(--slate);
  font-size: 14px;
  line-height: 1.5;
}

/* ── TOP NAV ── */
.topnav {
  background: var(--warm-white);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.nav-links {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.nav-link {
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  transition: background 0.15s, color 0.15s;
}
.nav-link:hover { background: var(--teal-light); color: var(--teal); }
.nav-link.active { background: var(--teal-light); color: var(--teal); }
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}
.logo-icon {
  width: 32px; height: 32px;
  background: var(--teal);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: white;
  letter-spacing: 0.02em;
}
.logo-text {
  font-weight: 600;
  font-size: 15px;
  color: var(--slate);
}
.logo-sub {
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
}

.search-container {
  flex: 1;
  max-width: 520px;
  margin: 0 auto;
  position: relative;
}
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}
#search {
  width: 100%;
  height: 38px;
  background: var(--cream);
  border: 1.5px solid var(--border-strong);
  border-radius: 20px;
  padding: 0 16px 0 38px;
  font-family: inherit;
  font-size: 14px;
  color: var(--slate);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
#search:focus {
  border-color: var(--teal);
  background: #181f2e;
  box-shadow: 0 0 0 3px rgba(20,184,166,0.15);
}
#search::placeholder { color: var(--muted); }

.nav-stats {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-stats strong { color: var(--slate); font-weight: 600; }
.nav-back-btn {
  margin-left: auto; display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500;
  color: var(--muted); text-decoration: none; border: 1px solid var(--border-strong);
  transition: all 0.15s; flex-shrink: 0;
}
.nav-back-btn:hover { color: var(--teal); border-color: var(--teal); background: var(--teal-light); }

/* ── LAYOUT ── */
.layout {
  display: flex;
  padding-top: 56px;
  height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--warm-white);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  height: calc(100vh - 56px);
  padding: 16px 0 32px;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

.sidebar-heading {
  padding: 0 16px 6px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-top: 16px;
}
.sidebar-heading:first-child { margin-top: 0; }

.filter-group {
  margin-bottom: 4px;
}

.filter-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  cursor: pointer;
  border-radius: 0;
  transition: background 0.15s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  color: var(--slate-light);
  font-size: 13px;
  font-family: inherit;
  position: relative;
}
.filter-item:hover { background: var(--cream); color: var(--slate); }
.filter-item.active {
  background: var(--teal-light);
  color: var(--teal);
  font-weight: 500;
}
.filter-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--teal);
  border-radius: 0 2px 2px 0;
}
.filter-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.filter-count {
  font-size: 11px;
  background: var(--cream);
  color: var(--muted);
  border-radius: 10px;
  padding: 1px 7px;
  min-width: 26px;
  text-align: center;
  flex-shrink: 0;
}
.filter-item.active .filter-count {
  background: rgba(20,184,166,0.15);
  color: var(--teal);
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 10px 16px;
}

/* ── MAIN ── */
.main {
  flex: 1;
  overflow-y: auto;
  height: calc(100vh - 56px);
  display: flex;
  flex-direction: column;
}
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

/* TOOLBAR */
.toolbar {
  background: var(--warm-white);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 10;
}
.result-info { font-size: 13px; color: var(--muted); }
.result-info strong { color: var(--slate); font-weight: 600; }

.active-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex: 1;
}
.active-chip {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--teal-light);
  color: var(--teal);
  border-radius: 12px;
  padding: 3px 10px 3px 10px;
  font-size: 12px;
  font-weight: 500;
}
.chip-clear {
  cursor: pointer;
  opacity: 0.7;
  font-size: 14px;
  line-height: 1;
  margin-left: 2px;
}
.chip-clear:hover { opacity: 1; }

.sort-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.sort-label { font-size: 12px; color: var(--muted); }
select.sort-select {
  font-family: inherit;
  font-size: 12px;
  background: var(--cream);
  border: 1px solid var(--border-strong);
  border-radius: 6px;
  padding: 5px 8px;
  color: var(--slate);
  cursor: pointer;
  outline: none;
}
select.sort-select:focus { border-color: var(--teal); }

/* RESULTS */
#results {
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.case-card {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.18s;
  box-shadow: var(--card-shadow);
  position: relative;
  overflow: hidden;
}
.case-card:hover {
  border-color: var(--teal-mid);
  box-shadow: var(--card-shadow-hover);
  transform: translateY(-1px);
}
.case-card.has-complication {
  border-left: 3px solid var(--red);
}
.case-card.has-tips {
  border-left: 3px solid var(--amber-mid);
}
.case-card.has-complication.has-tips {
  border-left: 3px solid var(--amber-mid);
}

.card-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 8px;
}
.card-emoji { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.card-title-wrap { flex: 1; min-width: 0; }
.card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--slate);
  line-height: 1.35;
  margin-bottom: 3px;
}
.card-cat {
  font-size: 11.5px;
  color: var(--teal);
  font-weight: 500;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 8px;
}
.tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
}
.tag-hosp { background: var(--green-light); color: var(--green); }
.tag-type-v { background: var(--purple-light); color: var(--purple); }
.tag-type-n { background: var(--teal-light); color: var(--teal); }
.tag-attending { background: var(--cream); color: var(--slate-light); border: 1px solid var(--border); }
.tag-complication { background: var(--red-light); color: var(--red); }
.tag-tips { background: var(--amber-light); color: var(--amber); }
.tag-date { background: transparent; color: var(--muted); padding: 2px 0; }

.card-technique {
  font-size: 12.5px;
  color: var(--slate-light);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-peek-notes {
  margin-top: 7px;
  padding: 6px 10px;
  background: var(--amber-light);
  border-radius: 6px;
  font-size: 12px;
  color: var(--amber);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-peek-notes::before { content: ''; }

/* EMPTY STATE */
.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty h3 { font-size: 18px; color: var(--slate); margin-bottom: 8px; }
.empty p { font-size: 14px; }

/* ── DRAWER ── */
.drawer-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 300;
  backdrop-filter: blur(2px);
}
.drawer-overlay.open { display: block; }

.drawer {
  position: fixed;
  top: 56px; right: 0; bottom: 0;
  width: 560px;
  max-width: 100vw;
  background: #111620;
  border-left: 1px solid var(--border);
  z-index: 301;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  box-shadow: -8px 0 32px rgba(0,0,0,0.4);
}
.drawer.open { transform: translateX(0); }
.drawer::-webkit-scrollbar { width: 6px; }
.drawer::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

.drawer-hero {
  padding: 24px 24px 20px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.drawer-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--cream);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 16px;
  transition: all 0.15s;
}
.drawer-close:hover { background: var(--border); color: var(--slate); }

.drawer-emoji { font-size: 32px; margin-bottom: 12px; display: block; }
.drawer-cat {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--teal);
  margin-bottom: 8px;
}
.drawer-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--slate);
  line-height: 1.35;
  margin-bottom: 14px;
  padding-right: 36px;
}
.drawer-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.drawer-body { padding: 20px 24px 40px; }

.section {
  margin-bottom: 24px;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.section-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.section-icon.blue { background: var(--teal-light); }
.section-icon.amber { background: var(--amber-light); }
.section-icon.green { background: var(--green-light); }
.section-icon.red { background: var(--red-light); }
.section-icon.purple { background: var(--purple-light); }

.section-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--slate-light);
}

.content-block {
  background: var(--cream);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--slate);
  white-space: pre-wrap;
  word-break: break-word;
  font-family: 'IBM Plex Sans', sans-serif;
}
.content-block.notes-block {
  background: var(--amber-light);
  border: 1px solid rgba(245,158,11,0.2);
}
.content-block.implants-block {
  background: var(--green-light);
  border: 1px solid rgba(34,197,94,0.2);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12.5px;
}
.content-block.complication-block {
  background: var(--red-light);
  border: 1px solid rgba(239,68,68,0.2);
  color: var(--red);
  font-weight: 500;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
}
.stat-box {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
}
.stat-box .label {
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 3px;
}
.stat-box .value {
  font-size: 14px;
  font-weight: 600;
  color: var(--slate);
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.case-card {
  animation: fadeUp 0.2s ease both;
}

/* ── VIEW TABS ── */
.view-tabs { display: flex; gap: 2px; background: #0b0f14; border-radius: 8px; padding: 3px; margin-right: 12px; }
.view-tab {
  padding: 5px 14px; border: none; border-radius: 6px; background: transparent;
  color: var(--muted); font-family: inherit; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.view-tab.active { background: var(--teal-light); color: var(--teal); }

/* ── ADD CASE BUTTON ── */
.add-case-btn {
  padding: 6px 16px; border: none; border-radius: 8px;
  background: var(--teal); color: white; font-family: inherit;
  font-size: 12px; font-weight: 600; cursor: pointer; margin-left: 8px;
  transition: background 0.15s;
}
.add-case-btn:hover { background: #0d9488; }
.export-btn {
  padding: 6px 14px; border: 1px solid var(--border-strong); border-radius: 8px;
  background: none; color: var(--muted); font-family: inherit;
  font-size: 12px; font-weight: 500; cursor: pointer; margin-left: 8px;
  transition: all 0.15s;
}
.export-btn:hover { color: var(--teal); border-color: var(--teal); background: var(--teal-light); }
/* Export Modal */
.export-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000;
  display: none; align-items: center; justify-content: center;
}
.export-modal-overlay.open { display: flex; }
.export-modal {
  background: var(--warm-white); border: 1px solid var(--border-strong);
  border-radius: 14px; padding: 28px 32px; width: 420px; max-width: 95vw;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.export-modal h2 { font-size: 16px; font-weight: 600; color: var(--slate); margin-bottom: 20px; }
.export-section { margin-bottom: 18px; }
.export-section label.section-label {
  display: block; font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px;
}
.export-radio-row { display: flex; gap: 16px; flex-wrap: wrap; }
.export-radio-row label, .export-check-row label {
  display: flex; align-items: center; gap: 7px; font-size: 13px;
  color: var(--slate-light); cursor: pointer;
}
.export-radio-row input, .export-check-row input { accent-color: var(--teal); }
.export-year-list {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
}
.export-year-list label {
  display: flex; align-items: center; gap: 5px; font-size: 12px;
  color: var(--slate-light); cursor: pointer;
  background: var(--cream); border: 1px solid var(--border-strong);
  border-radius: 6px; padding: 4px 10px;
}
.export-year-list label:has(input:checked) { border-color: var(--teal); color: var(--teal); }
.export-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
.export-cancel-btn {
  padding: 8px 18px; border: 1px solid var(--border-strong); border-radius: 8px;
  background: none; color: var(--muted); font-family: inherit;
  font-size: 13px; cursor: pointer;
}
.export-go-btn {
  padding: 8px 20px; border: none; border-radius: 8px;
  background: var(--teal); color: white; font-family: inherit;
  font-size: 13px; font-weight: 600; cursor: pointer;
}
.export-go-btn:hover { background: #0d9488; }
/* Print export table */
@media print {
  body > *:not(#printExportWrap) { display: none !important; }
  #printExportWrap { display: block !important; }
}
#printExportWrap {
  display: none;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 10px;
  color: #000;
  background: #fff;
}
#printExportWrap h1 { font-size: 14px; margin-bottom: 8px; }
#printExportWrap table { border-collapse: collapse; width: 100%; }
#printExportWrap th, #printExportWrap td {
  border: 1px solid #ccc; padding: 3px 6px; text-align: left; vertical-align: top;
}
#printExportWrap th { background: #f0f0f0; font-weight: 600; }

/* ── CASE FORM ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.form-field { margin-bottom: 14px; }
.form-field label {
  display: block; font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--muted); margin-bottom: 5px;
}
.form-field input, .form-field select, .form-field textarea {
  width: 100%; padding: 9px 11px; background: #0b0f14;
  border: 1.5px solid var(--border-strong); border-radius: 7px;
  color: var(--slate); font-family: inherit; font-size: 13px;
  outline: none; transition: border-color 0.2s; resize: vertical;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  border-color: var(--teal);
}
.form-field select { cursor: pointer; }
.form-actions {
  display: flex; gap: 10px; margin-top: 20px; padding-top: 16px;
  border-top: 1px solid var(--border);
}
.form-cancel {
  flex: 1; padding: 10px; border: 1px solid var(--border-strong); border-radius: 8px;
  background: transparent; color: var(--muted); font-family: inherit;
  font-size: 13px; cursor: pointer; transition: all 0.15s;
}
.form-cancel:hover { border-color: var(--slate-light); color: var(--slate); }
.form-submit {
  flex: 2; padding: 10px; border: none; border-radius: 8px;
  background: var(--teal); color: white; font-family: inherit;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s;
}
.form-submit:hover { background: #0d9488; }
.form-submit:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── DASHBOARD ── */
#dashboardView { padding: 24px 20px; }
.dash-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.dash-stat {
  background: var(--warm-white); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; text-align: center;
}
.dash-stat-val { font-size: 28px; font-weight: 700; color: var(--teal); line-height: 1.2; }
.dash-stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }
.dash-section-title {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--muted); margin-bottom: 12px;
}
.acgme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; margin-bottom: 28px; }
.acgme-card {
  background: var(--warm-white); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
}
.acgme-card-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.acgme-card-name { font-size: 13px; font-weight: 500; color: var(--slate); }
.acgme-card-count { font-size: 14px; font-weight: 700; color: var(--teal); }
.acgme-bar-wrap { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.acgme-bar { height: 100%; background: var(--teal); border-radius: 3px; transition: width 0.5s ease; }
.monthly-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(36px, 1fr)); gap: 4px; margin-bottom: 28px; }
.month-bar-col { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.month-bar-wrap { width: 100%; height: 60px; display: flex; align-items: flex-end; }
.month-bar { width: 100%; background: var(--teal); border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.4s ease; }
.month-label { font-size: 9px; color: var(--muted); }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .sidebar { width: 220px; }
  .drawer { width: 100vw; }
  .logo-sub { display: none; }
  .dash-summary { grid-template-columns: 1fr 1fr; }
  .form-grid-4 { grid-template-columns: 1fr 1fr; }
}

      <div class="form-grid">
        <div class="form-field">

        <div class="form-field">
          <label>Hospital</label>
          <select id="cfHospital"><option value="">Select...</option></select>
        </div>
      </div>
      <div class="form-field">
        <label>Procedure Name</label>
        <input type="text" id="cfProcedure" placeholder="e.g., Port placement, TIPS revision..." required>
      </div>
      <div class="form-grid">
        <div class="form-field">
          <label>Procedure Type</label>
          <select id="cfProcType">
            <option value="">Select...</option>
            <option value="Vascular Intervention">Vascular</option>
            <option value="Nonvascular Intervention">Nonvascular</option>
          </select>
        </div>
        <div class="form-field">
          <label>ACGME Category</label>
          <select id="cfAcgme"><option value="">Select...</option></select>
        </div>
      </div>
      <div class="form-field">
        <label>CPT Codes</label>
        <input type="text" id="cfCptCodes" placeholder="e.g., 36561, 77001">
      </div>
      <div class="form-field">
        <label>Technique</label>
        <textarea id="cfTechnique" rows="4" placeholder="Describe the technique used..."></textarea>
      </div>
      <div class="form-grid">
        <div class="form-field">
          <label>Attending</label>
          <input type="text" id="cfAttending" placeholder="Last name">
        </div>
        <div class="form-field">
          <label>Accession</label>
          <input type="text" id="cfAccession" placeholder="Accession #">
        </div>
      </div>
      <div class="form-field">
        <label>Implants &amp; Materials</label>
        <textarea id="cfImplants" rows="2" placeholder="Devices, wires, catheters..."></textarea>
      </div>
      <div class="form-grid form-grid-4">
        <div class="form-field">
          <label>Case Time (min)</label>
          <input type="number" id="cfCaseTime" min="0">
        </div>
        <div class="form-field">
          <label>Fluoro Time (min)</label>
          <input type="number" id="cfFluoroTime" min="0" step="0.1">
        </div>
        <div class="form-field">
          <label>Dose (mGy)</label>
          <input type="number" id="cfRadDose" min="0" step="0.1">
        </div>
        <div class="form-field">
          <label>Contrast (mL)</label>
          <input type="number" id="cfContrast" min="0">
        </div>
      </div>
      <div class="form-grid">
        <div class="form-field">
          <label>Anesthetic Dose</label>
          <input type="text" id="cfAnesthetic" placeholder="e.g., v2mgf100mcg">
        </div>
        <div class="form-field">
          <label>SIR Complication Grade</label>
          <select id="cfSirGrade"><option value="">None</option></select>
        </div>
      </div>
      <div class="form-field">
        <label>Complication Narrative</label>
        <textarea id="cfComplication" rows="2" placeholder="Describe any complications..."></textarea>
      </div>
      <div class="form-field">
        <label>Notes / Tips</label>
        <textarea id="cfNotes" rows="3" placeholder="Clinical pearls, things to remember..."></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="form-cancel" onclick="closeCaseForm()">Cancel</button>
        <button type="submit" class="form-submit" id="cfSubmitBtn">Save Case</button>
      </div>
    </form>
  </div>
</div>

ending":"Lilly","Implant(s)":"18Fr MIC","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":"Can use the smallest inner portion of peel away telescoping to reinforce tube over wire if it won't advance through the sheath."},{"Date":"2025-02-28","Hospital":"WEM","Accession":"E17390412","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Venous access (all: tunneled, nontunneled, ports)","Procedure":"DL Hickman placement. SGS.","Technique":"Right IJ. 21G. Measure IVL. Make tunnel. Measure tunnel. Mark on catheter. Tunnel. Check catheter and cut. Plunge.","Attending":"Sankhla","Implant(s)":"12.5Fr DL Hickman","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v2mgf100mcg","Complication Narrative":"","SIR Grade":"","Notes":"Combo case x3"},{"Date":"2025-02-28","Hospital":"WEM","Accession":"E17436323","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Gastrostomy, gastrojejunostomy; tube checks","Procedure":"Jejunostomy tube exchange","Technique":"Inject. Stiff glide. Inflate with 5-7 mL.","Attending":"Sankhla","Implant(s)":"14 Fr J tube","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v2mgf100mcg","Complication Narrative":"","SIR Grade":"","Notes":"Combo case x3"},{"Date":"2025-02-28","Hospital":"WEM","Accession":"E17382146","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Abscess drainage & tube checks","Procedure":"Abdominal Pleurx","Technique":"Kit. Direct towards pelvis.","Attending":"Kim","Implant(s)":"15.5 Fr Pleurx","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"Yes","SIR Grade":"Minor Complication: A. No therapy, no consequence","Notes":"Vomited under MAC after Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-03-10","Hospital":"EUH","Accession":"E17540888","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Venous access (all: tunneled, nontunneled, ports)","Procedure":"Hickman placement. BMI 61","Technique":"Kit. Measure wire and tunnel length then mark on catheter. Tunnel.","Attending":"Citron","Implant(s)":"11 Fr DL Hickman","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":"In large patients position tip deep in RA to account for postural changes."},{"Date":"2025-03-10","Hospital":"EUH","Accession":"E17577058","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"IVC filter placement, retrieval","Procedure":"IVC filter placement","Technique":"Right IJ. Bard Denali sheath and flush obturator. Hand injection. Mark renal veins and deploy under continual fluoro. Post through sheath.","Attending":"Park","Implant(s)":"Bard Denali","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"Local","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-03-10","Hospital":"EUH","Accession":"E17528658","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Gastrostomy, gastrojejunostomy; tube checks","Procedure":"G tube placement","Technique":"3-T tacks. 18 G between in AP. 175 cm Amplatz. 8 x 4 conquest. 18Fr MIC g tube.","Attending":"Park","Implant(s)":"18Fr MIC G","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-03-10","Hospital":"EUH","Accession":"E17599416","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Angioplasty/stents/covered stents: arterial (peripheral renal, mesenteric)","Procedure":"GDA blowout","Technique":"Left CFA access 5fr x 10 cm sheath. 5Fr SOS2 select SMA. Angio. Celiac angio. Glidewire to get far out into hepatic vasculature to advance base catheter to the common hepatic. GWA to try. Changed to 5Fr C2 glide that went. Exchanged for exchange length Rosen. 6 Fr x 45 cm Ansel sheath just proximal to area of extravasation. 6 mm x 29 cm VBX across bleed. Deployed stent and took balloon out of sheath but on wire. Angiogram with good result. Saw dissection so used 5 x 40 mustang at 1 min. Still dissection. Left CFA angio and closure w/ AngioSeal. Started DAPT.","Attending":"Swilley","Implant(s)":"6 x 29 mm VBX","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":"Want to make stent a little longer to avoid watermelon seeding. If no bleed seen call surgeon. Usually they will still ask you to stent. Need to get wire far out in hepatic to get enough access to advance base catheter/sheath."},{"Date":"2025-03-11","Hospital":"EUH","Accession":"E17584670","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Gastrostomy, gastrojejunostomy; tube checks","Procedure":"G tube placement for venting malignant SBO","Technique":"Mark liver under US. Kelly to outline position. Insufflation. T tacks in lateral. 18G in AP. 180 cm Amplatz. 8 x 4 Conquest. Wouldn't advance. Removed balloon and used 20Fr peel-away dilator. Kumpe adjacent to wire through sheath to ensure still in stomach. Balloon inflated and pull back. Remove peelaway. Inject air and contrast in AP and lateral to make sure in correct position.","Attending":"Sankhla","Implant(s)":"18 Fr MIC","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":"Aspiration risk - GA. For venting some people prefer Pigtail in fundus vs G tube. Don't give glucagon if SBO."},{"Date":"2025-03-11","Hospital":"EUH","Accession":"E17359664","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"TIPS & TIPS evaluation/revision","Procedure":"TIPS for ascites","Technique":"RIJ x2. 10 Fr x 40 cm CheckFlo angled and straight. MPA and glidewire to select RHV. Puff forward and get wedged. Exchange for GWA. Advance sheath and place obturator of access device. Used Argon Traveler. Use ICE to find good access tract. Access under ICE. Advance exchnage length 0.018\" Nitrex. 135 cm Navicross. GWA. RIM to flip towards confluence. GWA out to splenic. 6 mm Conquest to dilate tract. Advance sheath into portal system. Exchange for marking pig. Venogram. Measure by injecting both HV and portal access. Bring sheath back across. Place stent. Unsheath 2 cm uncovered and pull back to tract. Pull back sheath into RA. Pull ripcord. Balloon to 8 mm. Completion venography. Measure pressures. 13 Fr Trialysis. Paracentesis with 5Fr centesis.","Attending":"Sankhla","Implant(s)":"8 +2 Viatorr","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":"Don't aspirate with 21G needle as won't pull back blood. The traveler has a 21G needle component."},{"Date":"2025-03-12","Hospital":"EUH","Accession":"E17277138","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Venous access (all: tunneled, nontunneled, ports)","Procedure":"Port placement","Technique":"RIJ access. Single stick. 21G needle curved. 0.018\" wire. Don't measure IVL. Make port pocket below incision. Cut at good length. Connect. Don't touch port or components.","Attending":"Charles","Implant(s)":"8 Fr SL Port","Case Time (min)":"","Fluoro Time (min)":"14.9 (two procedures)","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":  Volume (mL)":"","Anesthetic Dose":"","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-04-07","Hospital":"EUH","Accession":"E17919618","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Nephrostomy, nephroureterostomy; tube checks","Procedure":"PCNU to PCN conversion","Technique":"145 Amplatz. 7Fr short sheath. 10 Fr x 40 cm sheath for pullback DSA. New 10.2 Fr PCN","Attending":"Citron","Implant(s)":"10.2 Fr PCN","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-04-07","Hospital":"EUH","Accession":"E17808917","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"PTC, biliary drainage, biliary stents; tube checks","Procedure":"External biliary drain removal","Technique":"Inject show patent. Unlock drain cut and remove over wire.","Attending":"Charles","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"Local","Complication Narrative":"","SIR Grade":"","Notes":"Some people don't get labs ahead of time."},{"Date":"2025-04-07","Hospital":"EUH","Accession":"E18072312","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Nephrostomy, nephroureterostomy; tube checks","Procedure":"Bilateral PCN placement for urinary diversion.","Technique":"Single stick. 21 G chiba under US. Inject w/ extension tubing and flowswitch. Nitrex wire. Greb set. 9Fr dilator. 10.2 Fr PCN. Did bilateral.","Attending":"Charles","Implant(s)":"10.2Fr PCN x2","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":"Even in diversion there is some pelvicoaliectasis. Charles doesn't like floswitch and tubing. When forming loop keep wire in tube."},{"Date":"2025-04-07","Hospital":"EUH","Accession":"E17242497","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Nephrostomy, nephroureterostomy; tube checks","Procedure":"Right retrograde PCN exchange","Technique":"Don't inject tube. Unlock suture. Advance 0.035\" Amplatz into renal pelvis. Carefully remove. New tube.","Attending":"Charles","Implant(s)":"12 Fr x 40 cm biliary type tube","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v1mgf50mcg","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-04-07","Hospital":"EUH","Accession":"E18083883","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Nephrostomy, nephroureterostomy; tube checks","Procedure":"Bilateral PCN placement nondilated.","Technique":"Right - two stick. 21 G chiba down on stone. Inject to opacify. Then inject air. Target air filled calyx with 22G InRad down the barrel. Inject to confirm. 0.018\" Nitrex. Greb set. 0.035\" Amplatz. Serial dilators. 10.2 Fr PCN. Left - US target lower pole stone w/ 22G inRad. INject to confirm. Greb set. Stiff glide to get down ureter. Amplatz. Serial dilation. Drain. Gave 50 mL contrast and 10mg Lasix.","Attending":"Sankhla","Implant(s)":"10.2 Fr PCN x2","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":"Couldn't do XPERGUIDE due to patient's arms"},{"Date":"2025-04-08","Hospital":"EUH","Accession":"E18099056","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Embolization, emergency (trauma, GI bleed, bronchial bleed, other)","Procedure":"SMA, celiac angiogram for mesenteric hematoma.","Technique":"Right groin access. 5Fr C2, bentson. Select SMA. Prolonged injection 5/25 to opacify portomesenteric system. Celiac to see splenic. Close groin with Vascade. No DSA only fluoro store for groin access.","Attending":"Charles","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":"Vascade hold for 30 seconds. Then pressure for 2 minutes."},{"Date":"2025-04-08","Hospital":"EUH","Accession":"E18108614","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Biopsy","Procedure":"TJLBx","Technique":"Right IJ. 9 Fr x 30 cm Cordis Brite Tip. Rosen wire. 5Fr MPA. Safety wire down. Select veins with MPA and 0.035\" glidewire. Puff down. Advance sheath over the catheter after taking RA pressure through sheath. Wedge from catheter. Free hepatic from sheath. Cook cannula over wire. Needle and take three biopsies. Slightly different places. Aim anterior.","Attending":"Charles","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-04-08","Hospital":"EUH","Accession":"E18084788","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Dialysis access intervention","Procedure":"LUE brachiocephalic fistulogram for recirculation","Technique":"Lidocaine. 21G micropuncture via palpation. Wire, micropuncture. Transduced pressures. Connect and power injection 4/20. Look peripherally then centrally. Remove and manual compression.","Attending":"Charles","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":"Transduce pressures so you know pre/post intervention. Access by palpating and hold vein then access between. You are looking for stenosis. Subclavian segment can be tough on AP. Look for collaterals to suggest stenosis or transduce pressures pre and post."},{"Date":"2025-04-08","Hospital":"EUH","Accession":"E18107048","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Abscess drainage & tube checks","Procedure":"Left urinoma drain","Technique":"US, 21G, transitional. Sample. Amplatz. 8.5Fr drain.","Attending":"Charles","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v1mgf100mcg","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-04-08","Hospital":"EUH","Accession":"E18107048","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Nephrostomy, nephroureterostomy; tube checks","Procedure":"Left PCN for RP adenopathy","Technique":"US. 21G Chiba. Inferior calyx. Nitrex and Neff set. Inject with inner to confirm. Amplatz, 4Fr Kumpe with glide to cross obstruction. Then tried 5 Fr x 20 cm sheath. Bring right up to obstruction and tap with kumpe and glidewire. Tried straight glidewire. Unsuccessful. Tried 5 Fr Kumpe. Unsuccessful. Replaced Amplatz. 10.2 Fr PCN.","Attending":"Charles","Implant(s)":"10.2 Fr PCN","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v1mgf100mcg","Complication Narrative":"","SIR Grade":"","Notes":"When accessing find where needle is and then come back and reposition. Don't try to bend needle. This will really bother Charles"},{"Date":"2025-04-08","Hospital":"EUH","Accession":"E18110096","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Abscess drainage & tube checks","Procedure":"RUQ drain injection and exchange","Technique":"INject drain. Show fistula. Amplatz and Kumpe. 12 Fr biliary","Attending":"Charles","Implant(s)":"12 Fr biliary","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"local","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-04-09","Hospital":"EUH","Accession":"E17277916","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"TIPS & TIPS evaluation/revision","Procedure":"TIPS check","Technique":"Right IJ access. 9Fr x 30 cm sheath. Rosen wire. 5 Fr x 65 MPA, 0.035\" glidewire. Cannulated tips with angled and wire. Bring into MPV. Puff to confirm. Exchange for Rosen. Advance sheath into proximal TIPS. Exchange for 5 Fr straight flush. 5/15 x 2 in obliquities. Transduce MPV, mid TIPS, HV, RA.","Attending":"Charles","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-04-09","Hospital":"EUH","Accession":"E18011179","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Venous access (all: tunneled, nontunneled, ports)","Procedure":"PICC exchange","Technique":"V-18. Peel away. New line.","Attending":"Charles","Implant(s)":"5 Fr x 40 cm DL PICC","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-04-09","Hospital":"EUH","Accession":"E17979964","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Gastrostomy, gastrojejunostomy; tube checks","Procedure":"G tube placement","Technique":"Don't mark liver. Insufflate. Check lateral and compress document no colon. AP. Two T tacks aspirate air and deploy tacks. 18G slight angulation towards pylorus. Aspirate. 180 cm Amplatz. Remove needle. Telescoping dilator. Tube, 5 mL in bulb. Peel away. Pull back with wire and fluoro. Bumper. Inject around wire. Remove wire and inject again.","Attending":"Charles","Implant(s)":"18 Fr MIC","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-04-09","Hospital":"EUH","Accession":"E18080785","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Venous access (all: tunneled, nontunneled, ports)","Procedure":"TDC placement, single stick","Technique":"Curve 21G. numb tract. Access IJ under US. 0.018\" wire. Keep forward pressure. Transitional. Amplatz. Shortest catheter. Dilate, peel away. Push on neck near venotomy to make sure it's taking correct angles. When pushing through make sure cuff goes into peel away before removing.","Attending":"Charles","Implant(s)":"15.5Fr x 19 cm TTC TDC","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-04-09","Hospital":"EUH","Accession":"E18115077","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"PTC, biliary drainage, biliary stents; tube checks","Procedure":"PTC for bile duct transection during surg onc ablation","Technique":"22G chiba towards T12. Opacify ducts, access. Nef set. Inner portion. Kumpe and glidwire to flip. No successful. Attempt to access VI ducts. Again unsuccessful. Biloma drain exchange w/ amplatz and kumpe.","Attending":"Charles","Implant(s)":"12 Fr biliary, 10.2 Fr pigtail","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-04-10","Hospital":"EUH","Accession":"E17098161","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Nephrostomy, nephroureterostomy; tube checks","Procedure":"Right PCN exchange","Technique":"Bentson. 10 fr x 10 cm sheath. 5 Fr kumpe. Antegrade. Exchange for new 12 Fr drain.","Attending":"Sankhla","Implant(s)":"12 Fr MPD","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-04-10","Hospital":"EUH","Accession":"E17811319","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"PTC, biliary drainage, biliary stents; tube checks","Procedure":"Biliary stent placement","Technique":"180 cm Amplatz. Marking pigtail. Measure out. Wallflex over the wire (monorail). Deploy. 5 Fr x 10 cm sheath to maintain access.","Attending":"Citron","Implant(s)":"8 x 80 Wallflex fully covered","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":"Want partially covered ideally. Covered prevents ingrowth. Uncovered better at staying in place."},{"Date":"2025-04-10","Hospital":"EUH","Accession":"E18168156","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"PTC, biliary drainage, biliary stents; tube checks","Procedure":"PTC and PTBD for cholangio","Technique":"Left sided access w/ US. 22G chiba. Access duct. Aspirate bile for sample. Inject. Cope wire centrally. Neff set. 0.035\" glidewire with 5 Fr Kumpe to get down into duodenum. Remove wire and puff to delineat ampulla. Amplatz. Remove Kumpe. Drain.","Attending":"Charles","Implant(s)":"10.2 Fr x 40 biliary","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":"Combined case with bilateral PCNU placement"},{"Date":"2025-04-10","Hospital":"EUH","Accession":"E18126319","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Nephrostomy, nephroureterostomy; tube checks","Procedure":"Bilateral PCNU placement","Technique":"22G Chiba under US. Aspirate until urine then inject. Cope wire. Neff set. 5 Fr kump and 0.035\" glidewire to get down ureter. Measure from bladder to pelvis. Amplatz, remove kumpe, dilate and place drain. Right sided target kidney under fluoro with 22G chiba. aspirate until retunr of fluid while retracting. Inject to confirm. Cope wire neff set. Wire went straight down so just placed Amplatz through into bladder then dilated and placed same drain as contralateral side.","Attending":"Charles","Implant(s)":"10.2 Fr x 20 cm PCNU (x2)","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":"Combined case with bilateral PCNU placement"},{"Date":"2025-04-11","Hospital":"EUH","Accession":"E17848823","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Other","Procedure":"AVS and ovarin/gonadal vein sampling.","Technique":"Right CFV. 6 Fr x 45 cm angled sheath. SIM2 form in atrium. Bentson. Sheath up to left renal and select adrenophrenic trunk. 2.8 Fr x 130 cm Progreat and Transcend to cannulate the ovarian vein. Bring down and inject then sample. Select contralateral ovarian with SIM2. Tried Mickaelson and SIM1 to find three different candidates. Have small part of the microcatheter out to select and puff. Cut sideholes on all base catheters.","Attending":"Charles","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-04-11","Hospital":"EUH","Accession":"E18125493","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"TIPS & TIPS evaluation/revision","Procedure":"TIPS for hepatic hydrothorax and LVP","Technique":"RIJ x 2. 10 Fr x 40 cm. One angled one straight. Inferior access TIPS access. Exchange length Amplatz. Place ICE probe. 5 Fr MPA and glidewire to access middle hepatic. Confirm on ICE. Wedge. Pressure measurements. Advance sheath into hepatic. Remove wire and catheter and place TLAB cannula. Remove sheath and place 21 G x 65 cm Chiba through. Find target on ICE. Pull back as system to find good tract. Aim slightly anterior. Access into portal. Remove stylet. 300 cm Nitrex. Cross with 4 Fr x 90 cm Navicross. Inject. Amplatz. Advance sheath and TLAB through tract into portal. Remove TLAB. Lunderquist accross. Measure on ICE. Bring stent to end of sheath. Unsheath 2 cm and pull back. Look under ICE to se cess as above. Catheterized splenic shunt w/ Ravi MG1 and glidewire. Rosen to exchange for Walrus balloon. Inflate w/ 1 mL. Place catheter through Walrus. Inject to confirm static. STS foam. 0.035\" Terumo coils. Take down balloon slowly to make sure no reflux of STS. Inject. Saw other varices and coiled. Then went to groin and did BRTO with SOS2 and glidewire to select. Ravi MG1 over wire. Rosen. Then Walrus and same as above for BRTO. Final portal venogram.","Attending":"Swilley","Implant(s)":"Terumo Azur CX 20 x 39 (x4) \nTerumo Azur CX 16 x 32 \nTerumo Azur CX 15 x 20 \nTerumo Azur CX 12 x 30 \nTerumo Azur CX 13 x 24 \nTerumo Azur CX 8 x 24 (x2) \nTerumo Azur Hydrocoil 20 x 30 (x3","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-04-17","Hospital":"EUH","Accession":"E18285671","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"TIPS & TIPS evaluation/revision","Procedure":"TIPS and ATO","Technique":"RIJ x 2 access. 10Fr x 40 cm sheath superior for ICE. Inferior 10 Fr x 21.5 Intara sheath. MPA and glide to select right hepatic vein. Traveler set. Didn't like needle so used 21 G x 65 cm Chiba. Tough to access but eventually pulled back and aspirated until blood. Inject to confirm. 300 cm Nitrex. 4 Fr x 90 cm Navicross. Exchange length Amplatz. Advance cannula then sheath through tract.  Remove cannula. Marking pigtail to measure. 6 + 2 Viatorr. Deploy 2 cm then pull back. Unsheath. Deploy. 8 mm x 4 conquest. MPA and glide to select  varix. Coils. Repeat portal venogram.","Attending":"Park","Implant(s)":"Terumo Azur CX 13 x 24 (x2) \nTerumo Azur CX 10 x 19 (x2) \nTerumo Azur CX 8 x 24\nTerumo Azur Hydrocoil 6 x 15 \nTerumo Azur Hydrocoil 8 x 15","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":"Measure count from entry to diaphragm and add 1."},{"Date":"2025-04-18","Hospital":"EUH","Accession":"E18280738","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Embolization, emergency (trauma, GI bleed, bronchial bleed, other)","Procedure":"Small bowel AVM bleed","Technique":"Right CFA access 21G etc. Needed glidewire to navigate tortuosity. Tried C2 but hard due to dissection and plaque. SOS2. 2.4 Fr Progreat, Asahi Meister, Fathom wire. CBCT","Attending":"Kim","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":"Too many arterial supply to embolize. Risk of bowel ischemia."},{"Date":"2025-04-18","Hospital":"EUH","Accession":"E18266122","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Other","Procedure":"Cavogram, pressures, portal venogram","Technique":"Right CFV and CFA access. 5 Fr x 10 cm sheath arterial. 9 Fr x 45 cm venous. SOS2. Bentson. Glidewire.","Attending":"Pate","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":"Hang bit of benson out when selecting. Access far away from artery, superficial, then move to target. Don't move US."},{"Date":"2025-04-18","Hospital":"EUH","Accession":"E18305845","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Dialysis access intervention","Procedure":"AVG declot","Technique":"6 Fr short sheath directed towards venous outflow and arterial inflow each w/ 21G micropuncture, transitional, and Benson. Kumpe and central venogram performed first. TPA and some saline to dwell. Upsized both to 7Fr. 8 x 4 Conquest to balloon central venous stenosis and in stent outflow stenosis. Cross arterial anastamosis with Kumpe and Glidewire. Fistulogram. Rosen accross and Fogarty sweep x3. Clot maceration with 8 x 4 mm balloon. Arterial inflow angioplasty 6 x4 mm Mustang (carefully) for 2 minutes. Fistulogram with clot in aneurysmal segment. Cleaner device. Repeat central venoplasty with 10 mm balloon. Pull and hold pressure.","Attending":"Nikolic","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":"Desaturated during case but eventually improved. Keep central balloon up for 5 minutes. Never advance fogarty retrograde in arterial side."},{"Date":"2025-04-21","Hospital":"ESJH","Accession":"E18329818","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"PTC, biliary drainage, biliary stents; tube checks","Procedure":"Biliary stent extension and external drain","Technique":"Inject drain. Cut side of catheter and put glidewire down. Remove catheter. 10Fr x 10 cm sheath. 5Fr Kumpe to exchange for Amplatz. Pullback tractogram. Re-advance sheath with obturator. Use Kumpe to delineate papilla with pull back injection under LAO. Replace Amplatz after getting down with Glidewire. New 10 mm x 8 cm Viabil stent deployed.","Attending":"","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-04-22","Hospital":"ESJH","Accession":"E16749054","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Nephrostomy, nephroureterostomy; tube checks","Procedure":"Bilateral modified PCNU exchange","Technique":"Stiff glide. Cut hole and advance then cut tube and suture. Cut to similar length on back table. Advance and form cope loop. Same on contralateral. Needed 5Fr kumpe to get back down ureter since proximal ureteral obstruction.","Attending":"Peters","Implant(s)":"10.2 Fr PCNU x2","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic e rest with the wire. Post embo angio through base. Remove Jacky over the wire.","Attending":"Lindquester","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v1mgf50mcg","Complication Narrative":"","SIR Grade":"","Notes":"Renal end organ so you don't need as much volume since no parasitized flow. Tornado coils are tapered and form weird."},{"Date":"2025-05-30","Hospital":"ESJH","Accession":"E19013406","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Gastrostomy, gastrojejunostomy; tube checks","Procedure":"G tube exchange","Technique":"Short Amplatz. Exchange.","Attending":"Lindquester","Implant(s)":"18 Fr MIC G","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v0.5mgf25mcg","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-05-30","Hospital":"ESJH","Accession":"E19013098","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Gastrostomy, gastrojejunostomy; tube checks","Procedure":"J tube exchange","Technique":"Stiff glide. New tube. 4 mL inflation.","Attending":"Lindquester","Implant(s)":"20 Fr MIC J","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v0.5mgf25mcg","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-05-30","Hospital":"ESJH","Accession":"E18750298","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"PTC, biliary drainage, biliary stents; tube checks","Procedure":"Spyglass EHL, cholangioplasty, drain externalization","Technique":"180 Amplatz through drain. Remove. 11 Fr x 10 cm sheath. Cholangiogram through sheath. Another Amplatz then remove sheath and make one a safety wire. Used 12 Fr Peel away sheath. Spyglass device and look around. Cholangioplasty stenosis 8 x 4 Mustang. Repeat Spyglass + EHL. Cholangioplasty again. Spyglass - looked better. Repeat cholangiogram through 11 Fr sheath. Tractogram. Exchange for 10.2 Fr DM drain. Form cope peripheral to stenosis.","Attending":"Lindquester","Implant(s)":"10.2 Fr DM","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-05-30","Hospital":"ESJH","Accession":"E18974193","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Pain management","Procedure":"Left L4/L5 TSEFI","Technique":"Prone. 22G x 15 cm Spinal needle. Ipsilateral oblique. Just below Scotty dog chin. Check AP and lateral. Lateral want to be right over the lucent foramen. Inject contrast to confirm layering. Then 80 mg Kenalog 2mg 0.25% Bupivacaine.","Attending":"Lindquester","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-05-30","Hospital":"ESJH","Accession":"E19023433","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Abscess drainage & tube checks","Procedure":"Left RP fluid drain","Technique":"US. 18 G x 15 cm Chiba. Access angled down to get to dependent portion. 145 cm Amplatz. 12 Fr biliary drain. Accordion drain and Uresil.","Attending":"Lindquester","Implant(s)":"12 Fr biliary","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"local","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-02","Hospital":"EUHM","Accession":"E18534247","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Embolization, elective (uterine fibroids, PAVMs, peripheral AVMs, varicoceles, etc.)","Procedure":"UFE","Technique":"Left radial. 5 Fr x 125 cm MPA. 2.8 Fr Progreat, GT double angle glide. Benson. Access radial, Get into left. Roadmap from internal iliac to find uterine. Select uterine. AP. DSA. Embolize. 500 um Embozene, 700 um Embozene.","Attending":"Newsome","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v1.5mgf100mcg","Complication Narrative":"Yes","SIR Grade":"Minor Complication: A. No therapy, no consequence","Notes":"She had a seizure while trying to embolize. Abort case. Usually do 3 vials before going up."},{"Date":"2025-06-02","Hospital":"EUHM","Accession":"E18795593","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Venous access (all: tunneled, nontunneled, ports)","Procedure":"Port removal and replacement","Technique":"Occluded right side. Left side basically occluded. Got new IJ access on left. Glidewire, Kumpe, Amplatz to get down. Removed port but catheter wouldn't come out. Glidewire down catheter. Suture external portion and pull through a 10 Fr sheath. Didn't work. 11Fr sheath also wouldn't pass venotomy. Cutdown at venotomy and externalized catheter. Oversheath again didn't help. Groin access 14 Fr x 45 cm sheath at groin Loop snare to grab catheter and pull out from below which worked.","Attending":"Newsome","Implant(s)":"9.5 Fr x 35 cm DL Power Hickman","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v4mgf200mcg\nDilaudid 2 mg \nBenadryl 25 mg","Complication Narrative":"","SIR Grade":"","Notes":"Really long and complicated case. I guess if it won't come out try from the groin earlier."},{"Date":"2025-06-02","Hospital":"EUHM","Accession":"E18795593","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Venous access (all: tunneled, nontunneled, ports)","Procedure":"DL Hickman placement","Technique":"See above. Access smal LIJ. Nitrex to cross. Then glidewire. 5 Fr kumpe to exchange for Amplatz. 9.5 Fr x 35 cm Power Hickman","Attending":"Newsome","Implant(s)":"9.5 Fr x 35 cm DL Power Hickman","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v4mgf200mcg\nDilaudid 2 mg \nBenadryl 25 mg","Complication Narrative":"","SIR Grade":"","Notes":"Combined with prolonged port removal"},{"Date":"2025-06-02","Hospital":"EUHM","Accession":"E18979303","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Angioplasty/stents/covered stents: venous (all)","Procedure":"May Thurner stenting","Technique":"Left groin 9 Fr x 10 cm Pinnacle sheath. Venogram showing clot. Crossed with GWA. 8 x 8 Conquest venoplasty. Attempted filter retreival unsuccessful due to scoliosis (tried snare, hangman). IVUS to measure vessel diameter. Abre stent 12 x 100. Ballooned to 12 mm.","Attending":"Al-Khafaji","Implant(s)":"12 x 100 mm Abre","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-02","Hospital":"EUHM","Accession":"E18882473","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Venous access (all: tunneled, nontunneled, ports)","Procedure":"Right port placement","Technique":"RIJ. Measure off wire. Cephalad incision to pocket. SL port. Closed.","Attending":"Kim","Implant(s)":"8Fr ClearVue","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v1mgf50mcg","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-04","Hospital":"EUHM","Accession":"E19046265","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Gastrostomy, gastrojejunostomy; tube checks","Procedure":"G tube exchange; low profile","Technique":"Inject. Short amplatz. Measure with stoma measuring device. Place new tube. 5 mL in balloon. Inject.","Attending":"Newsome","Implant(s)":"20 Fr x 2.5 cm MIC-KEY","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"f50mcg","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-04","Hospital":"EUHM","Accession":"E17493490","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Nephrostomy, nephroureterostomy; tube checks","Procedure":"Right PCN change; antegrade","Technique":"Inject tube. Benson wire. 10 Fr x 15 cm sheath. Kumpe.","Attending":"Newsome","Implant(s)":"12 Fr MPD","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-04","Hospital":"EUHM","Accession":"E19088606","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Cholecystostomy; tube checks","Procedure":"Cholecystostomy placement","Technique":"US/Fluoro. Mark. Anesthetize down to capsule. 18 G x 10 cm chiba under US into GB. Aspirate sample. Curve Amplatz and place through needle to loop in GB. 8Fr dilator. 10.2 Fr drain. Gravity.","Attending":"Newsome","Implant(s)":"12 Fr MPD","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-04","Hospital":"EUHM","Accession":"E19069502","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Nephrostomy, nephroureterostomy; tube checks","Procedure":"Left PCN replacement","Technique":"Glidewire through tube that was partially out. Kumpe. Inject. Benson. New 8.5 Fr PCN.","Attending":"Newsome","Implant(s)":"8.5 Fr MPD","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v1mgf50mcg","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-04","Hospital":"EUHM","Accession":"E19090956","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"PTC, biliary drainage, biliary stents; tube checks","Procedure":"Trans-cholecystic GB drain exchange","Technique":"Inject. Amplatz and 4Fr glidecath to get past sideholes. Remove tube. New 16 Fr MPD. Lots of pus. Send sample. Positioned sideholes in GB lumen so it drains.","Attending":"Newsome","Implant(s)":"16 Fr MPD","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"f50mcg","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-04","Hospital":"EUHM","Accession":"E19035230","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Pain management","Procedure":"Bilteral Splanchnic cryo","Technique":"Prone arms up. Mark T11/T2 paravertebral space. Numb and cut. Place probe under CT fluoro. Place contralateral. 8-3-3-3 cryo. Remove. Post image.","Attending":"Kim","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"DLP 755.58","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-05","Hospital":"EUHM","Accession":"E17406400","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Nephrostomy, nephroureterostomy; tube checks","Procedure":"Left PCN check/change - foley in place","Technique":"Benson. New tube. Downsized from 22Fr to 12 Fr. Placed pursestring at site. Urasil to drain.","Attending":"Newsome","Implant(s)":"12 Fr MPD","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v1mgf75mcg","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-05","Hospital":"EUHM","Accession":"E17975750","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Aspiration, drainage, sclerosis (cyst, lymphocele); tube checks","Procedure":"Cystic hygroma sclerotherapy","Technique":"Assess under US. Access with 5 Fr yueh. Aspirate total volume. Also 21 G micropuncture and transitional. Flow switches over each.Cope wire to disrupt septations. Give 2% lidocaine into the cavity for local then aspirate. Inject doxycyline into cavity and massage while dwelling for a while. Drain it all out. Image vessels pre and post adjacent to make sure patent.","Attending":"Newsome","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":"Order the powder and then reconstitute yourself in IR in 10mL. Otherwise they send in 20 mL and it may be too much for the space you're working in."},{"Date":"2025-06-05","Hospital":"EUHM","Accession":"E18924272","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Venous access (all: tunneled, nontunneled, ports)","Procedure":"RIJ SL Port placement","Technique":"RIJ access. Amplatz. Mark skin and anesthetize. Make pocket (full port tray). Tunnel from the venotomy down and connect catheter backwards (so zero is intravascular). Put make sure it works outside of the body. Put in pocket. and determine length outside (what looks good). Cut to length. Close with running and interrupted.","Attending":"Newsome","Implant(s)":"8Fr SL port","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v2mgf100mcg","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-05","Hospital":"EUHM","Accession":"E19111115","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Embolization, emergency (trauma, GI bleed, bronchial bleed, other)","Procedure":"Left gastric, gastroepiploic embolization for hemorrhagic gastritis","Technique":"Left radial access. RAVI MG1, 2.4 Fr Progreat, 0.018\" asahi meister. Celiac shared origin with SMA. Selected left gastric. Embolized with thin gelfoam slurry and coils. Selected gastroepiploic and embolized with coils and gelfoam slurry.","Attending":"Newsome","Implant(s)":"Embold 3 x 12 \nEmbold 3 x 6 (x2) \nBalt 3 x 20 \nBalt 3 x 10","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":"Would do with GA if possible for breath holds. Radial case have table to the side and out. JN doesn't like radial for visceral interventions."},{"Date":"2025-06-06","Hospital":"EUHM","Accession":"E18436567","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Biopsy","Procedure":"TJLBX","Technique":"RIJ access. 10 Fr x 40 cm straight sheath. Rosen. Wouldn't advance sheath so had to use straight instead of curved. Amplatz to advance. MPA to select right hepatic vein. RA, wedged, free HV pressures. Three passes anterior. Completion venogram. Remove cannula over the wire.","Attending":"Newsome","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v1mgf50mcg","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-06","Hospital":"EUHM","Accession":"E16126889","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Gastrostomy, gastrojejunostomy; tube checks","Procedure":"G tube exchange","Technique":"Short Amplatz. Exchange.","Attending":"Newsome","Implant(s)":"18 Fr MIC G","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"Local","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-06","Hospital":"EUHM","Accession":"E19133724","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Cholecystostomy; tube checks","Procedure":"Cholecystostomy placement","Technique":"CT fluoro. Mark skin. 25G finder needle. 18G x 15 cm Chiba. Curve Amplatz. Dilated 8 Fr. Place 10.2 Fr MPD.","Attending":"Newsome","Implant(s)":"10.2 Fr MPD","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"DLP 505.79","Contrast Volume (mL)":"","Anesthetic Dose":"v2g100mcg","Complication Narrative":"","SIR Grade":"","Notes":"There is a diamond tip needle that is better for inflammed GB because they can be very hard. Chiba tends to push away if wall is too thick."},{"Date":"2025-06-06","Hospital":"EUHM","Accession":"E19130402","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Nephrostomy, nephroureterostomy; tube checks","Procedure":"Right PCNU modified, left PCNU placement","Technique":"22G inrad needle. Access lower pole on right. Greb set. Got down with 0.035\" glidewire. Follow with Kumpe. Couldn't get into bladder. Modified placement after many attempts. Access left kidney same under US. Return urine - don't injection. Wire. Greb set. GWA to get down with 7 Fr x 25 cm sheath and 5Fr Kumpe catheter. Got into maybe bladder. Empirically placed 10.2 x 28 cm PCNU. Both to gravity.","Attending":"Newsome","Implant(s)":"10.2 Fr PCNU modified\n10.2 Fr x 28 cm PCNU","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":"Always use sheath when using Kumpe not just bareback. Secure hubs to the skin with Primapore."},{"Date":"2025-06-08","Hospital":"EUH","Accession":"E19156885","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Nephrostomy, nephroureterostomy; tube checks","Procedure":"Left PCN placement","Technique":"Accustick. US. Cope wire. 45 cm Kumpe. Glidewire. Didn't work. Amplatz and 10.2 Fr PCN after 8 Fr dilation.","Attending":"Lilly","Implant(s)":"10.2 Fr PCN","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-08","Hospital":"EUH","Accession":"E19157814","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Abscess drainage & tube checks","Procedure":"Presacral abscess drain CT","Technique":"18G x 10 cm chiba. Parasacral below the ligament. Short amplatz. Dilation. 12 Fr M drain. Aspirate.","Attending":"Lilly","Implant(s)":"12 Fr M drain","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"3561 DLP","Contrast Volume (mL)":"","Anesthetic Dose":"v2mgf100mcgd1mg","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-08","Hospital":"EUH","Accession":"E19162129","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Embolization, emergency (trauma, GI bleed, bronchial bleed, other)","Procedure":"RP bleed embolization","Technique":"Right groin. 5 Fr x 10 sheath. Mickaelson. 2.4 Fr progreat. Transcend wire. Coils and gelfoam each level. Get out gelfoam then coil back. Make sandwich. Identify anterior spinal artery and avoid. Iliolumbar. FLush aortogram.","Attending":"Lilly","Implant(s)":"Embold 3 x 12 \nEmbold 4 x 15 (x4\nEmbold 2 x 6 \nEmbold 3 x 12 \nBalt 2 x 12 (x2)\nBalt 3 x 20 (x2)\nBalt 3 x 10 \nBalt 4 x 10 \nBalt 2 x 12 \nBalt 3.5 x 12 (x2)\nBalt 4 x 35","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-09","Hospital":"EUH","Accession":"E19186300","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"TIPS & TIPS evaluation/revision","Procedure":"TIPS creation. Bleeding EV.","Technique":"RIJ access. 10 Fr x 45 cm angled sheath. MPA/Kumpe and glide to select middle hepatic vein. Amplatz follow down with sheath. Do CO2 wedged to see portal system. Pull back. Roch-Uschida set to access. Once blood return try stiff glidewire. If not going pull back a little then try the wire. It should go very easily. Once accross 0.035\" Navicross catheter. Exchange for lunderquist. Follow with access cannula and sheath. Marking Pigtail to measure parenchymal tract. Appropriately sized TIPS. Deploy. Plasty with Conquest 8 mm balloon. Select varices and embolize. Post pressures. Place trialysis.","Attending":"Swilley","Implant(s)":"13 mm Hydrocoil \nEmbold","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-16","Hospital":"GMH","Accession":"B13598159","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"TIPS & TIPS evaluation/revision","Procedure":"TIPS creation. Ascites.","Technique":"RIJ access. 10 Fr x 45 cm sheath. MPA and glidewire to select. Fogarty for balloon occlusion portal venogram and pressures. CO2. 21 G x 65 cm Chiba + TLAB set to access (blindly?). GT double angle glide to cross. 90 cm 0.035\" CXI to cross. Lunderquest. Marking pigtail. Inject both to measure tract length. Remove TLAB. Cross sheath with obturator. Deploy TIPS stent. Balloon 10 x 4 Conquest. Looked horrible. Ballooned with 12 mm mustang. Looked good. Placed 16 cm Vascath. No fluid for paracentesis.","Attending":"Best","Implant(s)":"6 + 2 Viatorr","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"GA","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-16","Hospital":"GMH","Accession":"B13680015","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Embolization, emergency (trauma, GI bleed, bronchial bleed, other)","Procedure":"Splenic bleed","Technique":"Right CFA access. 5 Fr x 10 cm sheath. 5Fr SOS2. 2.4 Fr x 130 cm Renegade microcatheter 0.014\" Transcend. Tortuous. Went out to inferior pole spleen and power injection. Coiled PSA + gelfoam. Pulled back and inject. Catheterized GDA with glidewire. Exchange for C2 glide. DSA. Catheterized left gastric, left hepatic, then SMA for completeness. Closed right groin with AngioSeal. Closure device fractured.","Attending":"Dariushnia","Implant(s)":"5 x 7 cm Nester\n5 x 14 cm Nester","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v2mgf25mcg","Complication Narrative":"","SIR Grade":"","Notes":"Don't inject too hard or you will make the PSA bleed."},{"Date":"2025-06-17","Hospital":"GMH","Accession":"B13679121","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Embolization, elective (uterine fibroids, PAVMs, peripheral AVMs, varicoceles, etc.)","Procedure":"RLE AVM STS and absolute ETOH embolization","Technique":"Contralateral access. 6 Fr x 45 cm Destination sheath. 5Fr Contra flush to cross bifurcation with Benson. 5Fr headhunter catheter as base. 1.9 Echelon (curved) microcatheter and 0.014\" fathom microwire. Selected branches that are abnormal. Injection contrast to determine volume to shunt. Inject equivalent amount absolute ETOH then flush with contrast followed by STS and then contrast. Did at a lot of levels.","Attending":"Best","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"MAC","Complication Narrative":"","SIR Grade":"","Notes":"When in extremities if no blood return aspirate back in case it has clotted. Don't want to send down the leg."},{"Date":"2025-06-17","Hospital":"GMH","Accession":"B13587736","Procedure Type":"Vascular Intervention","ACGME Procedure Category":"Venous ablation (varicose veins)","Procedure":"SSV EVLT","Technique":"Access SSV with micropuncture at low calf. Mark out course on skin. Benson under US to bring up to where it dives deep towards the popliteal. Want to be 1-2 cm below this. Place laser sheath at this level then fiber. Tumesent ansesthsia throughout the leg. Ablate at 50 J / cm (7W). Had 26 cm so did around 1300J. Remove and wrap leg x48 hours then compression stockings for 2-3 weeks.","Attending":"Best","Implant(s)":"","Case Time (min)":"","Fluoro Time (min)":"","Radiation Dose (mGy)":"","Contrast Volume (mL)":"","Anesthetic Dose":"v2mgf100mcg","Complication Narrative":"","SIR Grade":"","Notes":""},{"Date":"2025-06-17","Hospital":"GMH","Accession":"B13682820","Procedure Type":"Nonvascular Intervention","ACGME Procedure Category":"Nephrostomy, nephroureterostomy; tube checks     'SIR Grade': row.sir_grade || '',

}
